<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 관리 시스템</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 기본값 (admin 시트 로딩 실패 시 사용)
    // Apps Script에서 로드될 때까지 빈 값
    const DEFAULT_PRESETS = {};
    const DEFAULT_SITES = [];
    const DEFAULT_IDS = [];
    const DEFAULT_CARDS = [];
    const DEFAULT_DELIVERY_TYPES = [];
    const DEFAULT_REVIEW_METHODS = [];
    const DEFAULT_REVIEW_FEES = [];

    const OrderManager = () => {
      // 동적 설정 (review-setting 시트에서 로드)
      const [PRESETS, setPRESETS] = useState(DEFAULT_PRESETS);
      const [SITES, setSITES] = useState(DEFAULT_SITES);
      const [IDS, setIDS] = useState(DEFAULT_IDS);
      const [SITE_IDS, setSITE_IDS] = useState({});
      const [NAME_ID_MAPPINGS, setNAME_ID_MAPPINGS] = useState({}); // 이름별 사이트 아이디
      const [CARDS, setCARDS] = useState(DEFAULT_CARDS);
      const [DELIVERY_TYPES, setDELIVERY_TYPES] = useState(DEFAULT_DELIVERY_TYPES);
      const [REVIEW_METHODS, setREVIEW_METHODS] = useState(DEFAULT_REVIEW_METHODS);
      const [REVIEW_FEES, setREVIEW_FEES] = useState(DEFAULT_REVIEW_FEES);
      const [SITE_PATTERNS, setSITE_PATTERNS] = useState({});  // 주문서 패턴 (라벨 위치)
      const [SITE_SAMPLES, setSITE_SAMPLES] = useState({});    // 주문서 샘플 (유사도 인식용)

      // 로딩 상태
      const [loading, setLoading] = useState(true);
      const [configError, setConfigError] = useState('');
      const [showSiteManager, setShowSiteManager] = useState(false); // 사이트 관리 모달
      const [newSampleSite, setNewSampleSite] = useState('');
      const [newSampleText, setNewSampleText] = useState('');
      const [newSampleOrderNum, setNewSampleOrderNum] = useState('');
      const [newSamplePrice, setNewSamplePrice] = useState('');
      const [newSamplePriceRaw, setNewSamplePriceRaw] = useState('');
      const [newSampleReceiver, setNewSampleReceiver] = useState('');
      const [newSampleSaving, setNewSampleSaving] = useState(false);

      // review-setting 시트에서 설정 로드
      useEffect(() => {
        // 기본값으로 바로 시작 (Apps Script 로딩 스킵)
        setLoading(false);
        
        // 백그라운드에서 로드 시도 (실패해도 무시)
        loadConfigFromSheet();
      }, []);

const loadConfigFromSheet = async () => {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUHIN5oOqEUnrQ6_d2BvKMUkHdLNvJ4EZAozrV5IHUeSzjZV9-1uVaOcAw5eW4NDkX/exec';
  
  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    setConfigError('⚠️ Apps Script URL을 설정해주세요');
    setLoading(false);
    return;
  }

  console.log('📡 Apps Script 호출 중...', APPS_SCRIPT_URL);

  try {
    const callbackName = 'jsonpCallback_' + Date.now();
    
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        reject(new Error('Timeout'));
      }, 10000);
      
      window[callbackName] = (data) => {
        clearTimeout(timeout);
        delete window[callbackName];
        
        if (data.success && data.config) {
          const config = data.config;
          
          // 1. 프리셋 데이터 설정
          if (config.people && config.people.length > 0) {
            const newPresets = {};
            config.people.forEach(person => {
              const siteIds = config.nameIdMappings[person.name] || {};
              newPresets[person.name] = {
                name: person.name,
                reviewName: person.name.charAt(0) + '*' + person.name.charAt(person.name.length - 1),
                phone: person.phone,
                address: person.address,
                coupangId: siteIds['쿠팡'] || person.coupangId || '',
                naverId: siteIds['네이버'] || person.naverId || '',
                nickname: person.nickname || '',
                bank: person.bank || '',
                account: person.account || '',
                accountWithHyphen: person.account || '',
                accountHolder: person.accountHolder || ''
              };
            });
            setPRESETS(newPresets);
          }
          
          // 2. 기본 목록 설정 (카드, 배송, 리뷰 등)
          if (config.sites) setSITES(config.sites);
          if (config.siteIds) setSITE_IDS(config.siteIds);
          if (config.nameIdMappings) setNAME_ID_MAPPINGS(config.nameIdMappings);
          if (config.cards) setCARDS(config.cards);
          if (config.deliveryTypes) setDELIVERY_TYPES(config.deliveryTypes);
          if (config.reviewMethods) setREVIEW_METHODS(config.reviewMethods);
          if (config.reviewFees) setREVIEW_FEES(config.reviewFees.map(String));
          
          // 3. 핵심 수정: 모든 주문에 시트 기본값 자동 적용 (0번째 값들)
          setOrders(prevOrders => prevOrders.map(order => ({
            ...order,
            card: order.card || (config.cards && config.cards[0]) || '',
            deliveryType: order.deliveryType || (config.deliveryTypes && config.deliveryTypes[0]) || '',
            reviewMethod: order.reviewMethod || (config.reviewMethods && config.reviewMethods[0]) || '',
            reviewFee: order.reviewFee || (config.reviewFees && String(config.reviewFees[0])) || ''
          })));
          
          if (config.labelMappings) setLearnedMappings(config.labelMappings);
          if (config.sitePatterns) setSITE_PATTERNS(config.sitePatterns);
          if (config.siteSamples) setSITE_SAMPLES(config.siteSamples);
          
          setConfigError('');
          setLoading(false);
          console.log('✅ 시트 설정 및 모든 주문 기본값 로드 완료');
          resolve();
        } else {
          setLoading(false);
          reject(new Error(data.error || '설정 로드 실패'));
        }
      };
      
      const script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?action=getConfig&callback=' + callbackName;
      script.onerror = () => {
        clearTimeout(timeout);
        reject(new Error('Script load failed'));
      };
      document.body.appendChild(script);
    });
    
  } catch (error) {
    console.error('❌ 설정 로딩 실패:', error);
    setLoading(false);
    alert('❌ 설정을 불러올 수 없습니다. Apps Script URL을 확인해 주세요.');
    setConfigError('Apps Script 로딩 실패');
  }
};

    // 패턴 자동 추출 함수
    const extractPattern = (fullText, targetValue, fieldType) => {
      if (!targetValue || !fullText.includes(targetValue)) {
        console.warn(`⚠️ "${targetValue}"를 찾을 수 없습니다`);
        return '';
      }
      
      const index = fullText.indexOf(targetValue);
      
      // 바로 앞 20자만 (광고 문구 제외)
      const before = fullText.substring(Math.max(0, index - 20), index);
      const after = fullText.substring(index + targetValue.length, Math.min(fullText.length, index + targetValue.length + 5));
      
      console.log(`패턴 추출: "${targetValue}"`);
      console.log(`  앞 20자: "${before}"`);
      console.log(`  뒤 5자: "${after}"`);
      
      // 줄바꿈, 탭, 여러 공백 제거
      const beforeCleaned = before.replace(/[\n\t]/g, ' ').replace(/\s+/g, ' ').trim();
      
      // 마지막 단어만 추출 (2-8자)
      const words = beforeCleaned.split(' ');
      const label = words[words.length - 1] || '';
      
      console.log(`  정제된 앞: "${beforeCleaned}"`);
      console.log(`  라벨: "${label}"`);
      
      // 값 타입별 패턴
      let valuePattern = '';
      if (fieldType === 'orderNumber') {
        valuePattern = '([\\d-]+)';
      } else if (fieldType === 'price') {
        valuePattern = '([\\d,]+)';
      } else if (fieldType === 'receiver') {
        // 수취인: 라벨이 문장형(조사/마침표로 끝)이면 라벨 없이 이름 패턴만 반환
        const isBadLabel = !label || label.length > 5 || /[습니다요은는이가을를의.]$/.test(label);
        if (isBadLabel) {
          console.log('  수취인 라벨 부적합 → 라벨 없이 저장');
          return '([가-힣]{2,5})';
        }
        valuePattern = '([가-힣]{2,5})';
      } else {
        valuePattern = '([^\\t\\n]+)';
      }
      
      // 구분자: 라벨과 값 사이
      let separator = '';
      const lastChar = beforeCleaned.slice(-1);
      
      if (lastChar === ':' || lastChar === '：') {
        separator = '[:\\：]\\s*';
      } else if (label && /[가-힣a-zA-Z]/.test(lastChar)) {
        // 라벨 바로 뒤에 값
        separator = '\\s*';
      } else {
        separator = '\\s*';
      }
      
      const pattern = label + separator + valuePattern;
      console.log(`  최종 패턴: "${pattern}"`);
      
      return pattern;
    };

    // 고정텍스트 추출 (숫자/이름/주소 등 변동값 제거, 2자 이상 한글/영문 단어만)
    const extractFixedTexts = (text) => {
      // 숫자, 전화번호, 날짜, 금액, 주소 등 변동값 제거
      const cleaned = text
        .replace(/\d{3,}/g, '')          // 3자리 이상 숫자
        .replace(/[가-힣]{1,2}(?=\s|$)/g, '') // 1-2자 한글 (이름 등)
        .replace(/https?:\/\/\S+/g, '')  // URL
        .replace(/[^\uAC00-\uD7A3a-zA-Z\s]/g, ' ') // 특수문자 제거
        .replace(/\s+/g, ' ').trim();
      // 2자 이상 단어만 추출
      const words = cleaned.split(/\s+/).filter(w => w.length >= 2);
      return [...new Set(words)]; // 중복 제거
    };

    // 두 고정텍스트 배열의 Jaccard 유사도 계산
    const calcSimilarity = (arr1, arr2) => {
      if (!arr1.length || !arr2.length) return 0;
      const set1 = new Set(arr1);
      const set2 = new Set(arr2);
      const intersection = [...set1].filter(x => set2.has(x)).length;
      const union = new Set([...set1, ...set2]).size;
      return intersection / union;
    };

    // 범용 파싱 함수
    const parseOrderText = (text) => {
      const result = {
        site: '',
        orderNumber: '',
        price: '',
        receiver: '',
        phone: '',
        address: '',
        detected: false
      };

      // ── 1순위: 샘플 유사도로 사이트 감지 ──
      const inputFixed = extractFixedTexts(text);
      let bestSite = '';
      let bestScore = 0;
      const THRESHOLD = 0.15; // 15% 이상이면 인식
      Object.entries(SITE_SAMPLES).forEach(([site, sample]) => {
        if (sample.fixedTexts && sample.fixedTexts.length > 0) {
          const score = calcSimilarity(inputFixed, sample.fixedTexts);
          if (score > bestScore) { bestScore = score; bestSite = site; }
        }
      });
      if (bestScore >= THRESHOLD) {
        result.site = bestSite;
        console.log(`✅ 유사도 인식: ${bestSite} (${(bestScore*100).toFixed(1)}%)`);
      }

      // ── 2순위: 키워드 fallback (샘플 없거나 유사도 미달) ──
      if (!result.site) {
        const siteKeywords = {
          "쿠팡": ["쿠팡", "coupang"],
          "네이버": ["네이버페이", "네이버파이낸셜", "네이버"],
          "옥션": ["옥션", "auction", "eBay"],
          "지마켓": ["지마켓", "G마켓", "gmarket"],
          "11번가": ["11번가", "11st"],
          "SSG": ["SSG", "신세계"],
          "무신사": ["무신사", "musinsa"]
        };
        for (const [site, keywords] of Object.entries(siteKeywords)) {
          if (keywords.some(kw => text.includes(kw))) {
            result.site = site;
            console.log(`✅ 키워드 인식: ${site}`);
            break;
          }
        }
      }

      // 시트에 저장된 패턴으로 파싱 시도
      if (result.site && SITE_PATTERNS[result.site]) {
        const patterns = SITE_PATTERNS[result.site];
        
        if (patterns.orderNumber) {
          try {
            const regex = new RegExp(patterns.orderNumber, 'i');
            const match = text.match(regex);
            if (match && match[1]) {
              result.orderNumber = match[1].trim();
            }
          } catch (e) {
            console.warn('주문번호 패턴 오류:', e);
          }
        }
        
        if (patterns.price) {
          try {
            const regex = new RegExp(patterns.price, 'i');
            const match = text.match(regex);
            if (match && match[1]) {
              result.price = match[1].replace(/,/g, '');
            }
          } catch (e) {
            console.warn('금액 패턴 오류:', e);
          }
        }
        
        if (patterns.receiver) {
          try {
            const regex = new RegExp(patterns.receiver, 'i');
            const match = text.match(regex);
            if (match && match[1]) {
              result.receiver = match[1].trim();
            }
          } catch (e) {
            console.warn('수취인 패턴 오류:', e);
          }
        }
        
        // 패턴으로 파싱 성공하면 반환
        if (result.orderNumber && result.price) {
          result.detected = true;
          console.log('✅ 시트 패턴으로 파싱 성공:', result);
          return result;
        }
      }

      // 기본 패턴으로 fallback

      // 지마켓: 장바구니번호와 주문번호 둘 다 추출
      if (result.site === '지마켓') {
        const cartMatch = text.match(/장바구니번호\s*(\d{10,})/i);
        const orderMatch = text.match(/주문번호\s*(\d{10,})/i);
        
        if (cartMatch && cartMatch[1]) {
          result.cartNumber = cartMatch[1];
        }
        if (orderMatch && orderMatch[1]) {
          result.orderNumber = orderMatch[1];
        }
        
        console.log('지마켓 파싱:', { 
          장바구니번호: result.cartNumber, 
          주문번호: result.orderNumber 
        });
      }

      // 주문번호 추출 (다양한 패턴)
      if (!result.orderNumber) {
        const orderPatterns = [
          /주문번호\s*(\d{10,})/i,              // 쿠팡: "주문번호 21100171701760"
          /주문\s*번호[:\s]*(\d{10,})/i,
          /order[:\s]*(?:no|number)[:\s]*(\d{10,})/i,
          /번호[:\s]*(\d{10,})/i,
          /(\d{14,20})/                         // 14-20자리 숫자 (쿠팡 주문번호)
        ];

        for (const pattern of orderPatterns) {
          const match = text.match(pattern);
          if (match && match[1]) {
            result.orderNumber = match[1];
            break;
          }
        }
      }

      // 금액 추출
      const pricePatterns = [
        // ₩ 기호 패턴 (알리익스프레스 등)
        /합계\s*₩\s*([\d,]+)/i,
        /₩\s*([\d,]+)/,
        // 네이버페이 우선: 카드 간편결제 / 신용카드 뒤의 금액
        /(?:카드\s*간편결제|신용카드|체크카드)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /(?:카드\s*간편결제|신용카드|체크카드)[^\d]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 계좌이체
        /(?:계좌이체|무통장입금)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 네이버페이: 주문금액 섹션
        /주문금액[^\d]*총\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 일반 패턴
        /총\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /최종\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /total[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i
      ];

      for (const pattern of pricePatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.price = match[1].replace(/,/g, '');
          break;
        }
      }

      // 수취인 추출
      const receiverPatterns = [
        /받는사람\t([^\t\n]+)/i,              // 쿠팡: "받는사람\t정동신\t" (탭 구분)
        /받는사람\s{2,}([^\s\n][^\n]*)/i,    // 쿠팡: "받는사람   정동신"
        /받는\s*사람[:\s]+([가-힣]{2,5})/i,  // "받는 사람: 이해운" (한글 이름만)
        /수취인[:\s]+([가-힣]{2,5})/i,
        /수령자[:\s]+([가-힣]{2,5})/i,
        /받으시는\s*분[:\s]+([가-힣]{2,5})/i,
        /배송지명([가-힣]{2,5})\(/i  // 네이버: 배송지명지영신(엄마집)
      ];

      for (const pattern of receiverPatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.receiver = match[1].trim();
          break;
        }
      }

      // 수취인 패턴 실패 시 PRESETS 이름으로 직접 검색
      if (!result.receiver) {
        const presetNames = Object.keys(PRESETS);
        for (const name of presetNames) {
          if (text.includes(name)) {
            result.receiver = name;
            console.log(`✅ PRESETS 이름으로 수취인 인식: "${name}"`);
            break;
          }
        }
      }

      // 전화번호 추출
      const phonePatterns = [
        /연락처(010[-\s]?\d{3,4}[-\s]?\d{4})/i,  // 네이버: 공백없음
        /연락처\s*(010[-\s]?\d{4}[-\s]?\d{4})/i,  // 쿠팡
        /(010[-\s]?\d{4}[-\s]?\d{4})/
      ];
      for (const pattern of phonePatterns) {
        const phoneMatch = text.match(pattern);
        if (phoneMatch) {
          result.phone = phoneMatch[1].replace(/\s/g, '').replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
          break;
        }
      }

      // 주소 추출
      const addressPatterns = [
        /받는주소\s*\((\d{5})\)\s*([^\n]+)/i,     // 쿠팡
        /주소([가-힣0-9\s\-\(\)]+?)\s*\((\d{5})\)/i,  // 네이버: 주소...단독 (33600)
        /\((\d{5})\)\s*([^\n]+)/,
        /\[(\d{5})\]\s*([^\n]+)/,
        /주소[:\s]*\(?\d{5}\)?\s*([^\n]+)/i,
        /받는\s*주소[:\s]*([^\n]+)/i
      ];

      for (const pattern of addressPatterns) {
        const match = text.match(pattern);
        if (match) {
          // 주소 추출
          let addr = '';
          
          // 네이버 패턴: match[1]이 주소
          if (match[1] && match[1].match(/[가-힣]/)) {
            addr = match[1];
          } else if (match[2]) {
            // 쿠팡 등: match[2]가 주소
            addr = match[2];
          } else {
            addr = match[match.length - 1];
          }
          
          addr = addr.trim();

          const value = match[2].trim();
          if (!seen.has(value) && label.length >= 2) {
            seen.add(value);
            candidates.push({ label, value });
          }
        }
        return candidates;

        const patterns = [

        ];

            const value = match[2].trim();

        ];
        for (const pattern of patterns) {
          let match;
          while ((match = pattern.exec(text)) !== null) {
            const label = match[1].replace(/[\n\t]/g, ' ').trim();
            const rawValue = match[2];           // 원본 (콤마 포함, rawText 검색용)
            const value = rawValue.replace(/,/g, ''); // 숫자만 (저장/표시용)

            if (num >= 100 && num <= 10000000 && !seen.has(value)) {

          }

            // 슬래시 형식 체크 → 무조건 라벨 없이 출력
            if (line.includes('/')) {
              const parts = line.split('/');
              const values = parts.map(part => {
                const fieldName = part.trim();

              });
              
              // 슬래시 앞뒤 공백 유지

                  }, '👤 수취인'),
                  React.createElement('input', {
                    type: 'text',
                    value: learningData.receiver,
                    onChange: (e) => setLearningData({...learningData, receiver: e.target.value}),
                    placeholder: '받는 사람 이름 입력',
                    style: {
                      width: '100%', padding: '0.65rem',
                      border: !learningData.receiver ? '2px solid #cbd5e1'
                        : learningData.rawText.includes(learningData.receiver) ? '2px solid #10b981' : '2px solid #f59e0b',
                      borderRadius: '6px', fontSize: '1rem', boxSizing: 'border-box'
                    }
                  }),
                  learningData.receiver && (
                    learningData.rawText.includes(learningData.receiver)
                      ? React.createElement('p', { style: { margin: '0.3rem 0 0', fontSize: '0.78rem', color: '#10b981' } },
                          '✅ 주문서에서 발견됨 — 패턴으로 저장됩니다')
                      : React.createElement('p', { style: { margin: '0.3rem 0 0', fontSize: '0.78rem', color: '#f59e0b' } },
                          '⚠️ 주문서에서 찾을 수 없어요. 이번만 적용됩니다')
                  )
                ),

                // ── 버튼 ──
                React.createElement('div', { style: { display: 'flex', gap: '0.75rem', justifyContent: 'flex-end' } },
                  React.createElement('button', {
                    onClick: () => setShowLearningUI(false),
                    style: {
                      padding: '0.75rem 1.5rem', border: '1px solid #cbd5e1',
                      borderRadius: '6px', background: 'white', cursor: 'pointer', fontSize: '0.95rem'
                    }
                  }, '취소'),
                  // 이번 주문만 적용 (저장 안 함)
                  React.createElement('button', {
                    onClick: () => {
                      if (!learningData.site || !learningData.orderNumber || !learningData.price || !learningData.receiver) {
                        alert('사이트, 주문번호, 금액, 수취인을 모두 입력해주세요!');
                        return;
                      }
                      // 현재 주문 인덱스에 직접 적용 (패턴 저장 없이)
                      const idx = learningData.orderIndex;
                      if (idx !== null) {
                        const newOrders = [...orders];
                        newOrders[idx] = {
                          ...newOrders[idx],
                          site: learningData.site,
                          orderNumber: learningData.orderNumber,
                          price: learningData.price,
                          parsedReceiver: learningData.receiver
                        };
                        setOrders(newOrders);
                        setEditableData(prev => ({
                          ...prev,
                          [idx]: { ...(prev[idx] || {}), orderNumber: learningData.orderNumber, price: learningData.price, receiver: learningData.receiver, site: learningData.site }
                        }));
                      }
                      setShowLearningUI(false);
                    },
                    style: {
                      padding: '0.75rem 1.5rem', border: '2px solid #10b981',
                      borderRadius: '6px', background: 'white', color: '#10b981',
                      cursor: 'pointer', fontWeight: '600', fontSize: '0.95rem'
                    }
                  }, '이번만 적용'),
                  // 패턴 저장 + 적용
                  React.createElement('button', {
                    onClick: async () => {
                      if (!learningData.site || !learningData.orderNumber || !learningData.price) {
                        alert('사이트, 주문번호, 금액을 입력해주세요!');
                        return;
                      }
                      // 현재 주문에 즉시 적용
                      const idx = learningData.orderIndex;
                      if (idx !== null) {
                        const newOrders = [...orders];
                        newOrders[idx] = {
                          ...newOrders[idx],
                          site: learningData.site,
                          orderNumber: learningData.orderNumber,
                          price: learningData.price,
                          parsedReceiver: learningData.receiver
                        };
                        setOrders(newOrders);
                        setEditableData(prev => ({
                          ...prev,
                          [idx]: { ...(prev[idx] || {}), orderNumber: learningData.orderNumber, price: learningData.price, receiver: learningData.receiver, site: learningData.site }
                        }));
                      }
                      // 라벨 추출 (패턴용)
                      const orderNumberPattern = extractPattern(learningData.rawText, learningData.orderNumber, 'orderNumber');
                      const pricePattern = extractPattern(learningData.rawText, learningData.priceRawValue || learningData.price, 'price');
                      const receiverPattern = extractPattern(learningData.rawText, learningData.receiver, 'receiver');
                      // 라벨명 추출 (샘플용 - 패턴에서 앞부분만)
                      const getLabel = (pattern) => pattern ? pattern.replace(/[\\\[\]()?+*{}|]/g, '').replace(/\\s\*/g,'').trim() : '';
                      await saveSiteSample(
                        learningData.site,
                        learningData.rawText,
                        getLabel(orderNumberPattern),
                        getLabel(pricePattern),
                        getLabel(receiverPattern),
                        orderNumberPattern,
                        pricePattern,
                        receiverPattern
                      );
                    },
                    style: {
                      padding: '0.75rem 1.5rem', border: 'none',
                      borderRadius: '6px', background: '#3b82f6',
                      color: 'white', cursor: 'pointer', fontWeight: '600', fontSize: '0.95rem'
                    }
                  }, '✅ 저장 + 적용')
                )
              )
            ),

            // ── 사이트 관리 모달 ──
            showSiteManager && React.createElement('div', {
              style: {
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.7)', display: 'flex',
                justifyContent: 'center', alignItems: 'center', zIndex: 1001
              },
              onClick: () => setShowSiteManager(false)
            },
              React.createElement('div', {
                style: {
                  background: 'white', padding: '2rem', borderRadius: '12px',
                  width: '90%', maxWidth: '680px', maxHeight: '88vh', overflow: 'auto'
                },
                onClick: e => e.stopPropagation()
              },
                React.createElement('h2', {
                  style: { marginTop: 0, marginBottom: '0.5rem', color: '#1e293b', fontSize: '1.2rem' }
                }, '🏪 사이트 관리'),
                React.createElement('p', {
                  style: { color: '#64748b', marginBottom: '1.5rem', fontSize: '0.9rem' }
                }, '등록된 사이트 샘플 목록입니다. 주문서를 붙여넣어 새 사이트를 샘플로 등록하세요.'),

                // 등록된 샘플 목록
                Object.keys(SITE_SAMPLES).length === 0
                  ? React.createElement('p', {
                      style: { color: '#94a3b8', fontSize: '0.9rem', padding: '1rem', background: '#f8fafc', borderRadius: '8px' }
                    }, '등록된 샘플이 없습니다. 아래에서 새 샘플을 등록하세요.')
                  : React.createElement('div', { style: { marginBottom: '1.5rem' } },
                      Object.entries(SITE_SAMPLES).map(([site, sample]) =>
                        React.createElement('div', {
                          key: site,
                          style: {
                            padding: '0.75rem 1rem', marginBottom: '0.5rem',
                            border: '1px solid #e2e8f0', borderRadius: '8px',
                            background: '#f8fafc', display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                          }
                        },
                          React.createElement('div', null,
                            React.createElement('span', { style: { fontWeight: '600', color: '#1e293b' } }, site),
                            React.createElement('span', {
                              style: { marginLeft: '1rem', fontSize: '0.8rem', color: '#64748b' }
                            }, `고정텍스트 ${sample.fixedTexts ? sample.fixedTexts.length : 0}개 | 주문번호: ${sample.orderNumberLabel || '-'} | 금액: ${sample.priceLabel || '-'} | 수취인: ${sample.receiverLabel || '-'}`)
                          ),
                          React.createElement('button', {
                            onClick: () => deleteSiteSample(site),
                            style: {
                              padding: '0.3rem 0.6rem', border: '1px solid #fca5a5',
                              borderRadius: '6px', background: '#fef2f2', color: '#dc2626',
                              cursor: 'pointer', fontSize: '0.8rem', whiteSpace: 'nowrap'
                            }
                          }, '🗑️ 삭제')
                        )
                      )
                    ),

                // 새 샘플 등록 섹션
                React.createElement('div', {
                  style: { borderTop: '1px solid #e2e8f0', paddingTop: '1.5rem' }
                },
                  React.createElement('h3', {
                    style: { margin: '0 0 1rem', fontSize: '1rem', color: '#1e293b' }
                  }, '➕ 새 사이트 샘플 등록'),
                  React.createElement('p', {
                    style: { fontSize: '0.85rem', color: '#64748b', marginBottom: '1rem' }
                  }, '1) 사이트명 입력 → 2) 주문서 텍스트 붙여넣기 → 3) 주문번호/금액/수취인 입력 → 저장'),

                  (() => {
                    const inText = (val) => val && newSampleText.includes(val);
                    const priceCands = newSampleText ? extractPriceCandidates(newSampleText) : [];

                    return React.createElement('div', null,
                      // 사이트명
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '사이트명'),
                        React.createElement('input', {
                          type: 'text', value: newSampleSite,
                          onChange: e => setNewSampleSite(e.target.value),
                          placeholder: '예: 티몬, 위메프',
                          style: { width: '100%', padding: '0.6rem', border: '1px solid #cbd5e1', borderRadius: '6px', fontSize: '0.95rem', boxSizing: 'border-box' }
                        })
                      ),
                      // 주문서 텍스트
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '주문서 텍스트'),
                        React.createElement('textarea', {
                          value: newSampleText,
                          onChange: e => setNewSampleText(e.target.value),
                          placeholder: '주문서 전체 텍스트를 붙여넣으세요',
                          rows: 5,
                          style: { width: '100%', padding: '0.6rem', border: '1px solid #cbd5e1', borderRadius: '6px', fontSize: '0.85rem', boxSizing: 'border-box', resize: 'vertical' }
                        })
                      ),
                      // 주문번호
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '주문번호'),
                        React.createElement('input', {
                          type: 'text', value: newSampleOrderNum,
                          onChange: e => setNewSampleOrderNum(e.target.value),
                          placeholder: '실제 주문번호 입력',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSampleOrderNum ? '1px solid #cbd5e1' : inText(newSampleOrderNum) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSampleOrderNum && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: inText(newSampleOrderNum) ? '#10b981' : '#f59e0b' }
                        }, inText(newSampleOrderNum) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 금액 후보 + 입력
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '결제 금액'),
                        priceCands.length > 0 && React.createElement('div', {
                          style: { display: 'flex', flexWrap: 'wrap', gap: '0.3rem', marginBottom: '0.4rem', padding: '0.5rem', background: '#f8fafc', borderRadius: '6px', border: '1px solid #e2e8f0' }
                        },
                          React.createElement('span', { style: { width: '100%', fontSize: '0.75rem', color: '#64748b' } }, '📌 후보:'),
                          priceCands.map((c, i) => React.createElement('button', {
                            key: i,
                            onClick: () => { setNewSamplePrice(c.value); setNewSamplePriceRaw(c.rawValue); },
                            style: {
                              padding: '0.2rem 0.6rem', fontSize: '0.8rem', cursor: 'pointer', borderRadius: '16px',
                              border: newSamplePrice === c.value ? '2px solid #3b82f6' : '1px solid #cbd5e1',
                              background: newSamplePrice === c.value ? '#eff6ff' : 'white',
                              color: newSamplePrice === c.value ? '#1d4ed8' : '#475569'
                            }
                          }, `${c.label}: ${Number(c.value).toLocaleString()}원`))
                        ),
                        React.createElement('input', {
                          type: 'text', value: newSamplePrice,
                          onChange: e => { const v = e.target.value.replace(/,/g,''); setNewSamplePrice(v); setNewSamplePriceRaw(v); },
                          placeholder: '금액 숫자만',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSamplePrice ? '1px solid #cbd5e1' : newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSamplePrice && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '#10b981' : '#f59e0b' }
                        }, newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 수취인
                      React.createElement('div', { style: { marginBottom: '1rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '수취인'),
                        React.createElement('input', {
                          type: 'text', value: newSampleReceiver,
                          onChange: e => setNewSampleReceiver(e.target.value),
                          placeholder: '받는 사람 이름',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSampleReceiver ? '1px solid #cbd5e1' : inText(newSampleReceiver) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSampleReceiver && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: inText(newSampleReceiver) ? '#10b981' : '#f59e0b' }
                        }, inText(newSampleReceiver) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 저장 버튼
                      React.createElement('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: '0.75rem' } },
                        React.createElement('button', {
                          onClick: () => setShowSiteManager(false),
                          style: { padding: '0.65rem 1.5rem', border: '1px solid #cbd5e1', borderRadius: '6px', background: 'white', cursor: 'pointer' }
                        }, '닫기'),
                        React.createElement('button', {
                          disabled: newSampleSaving || !newSampleSite || !newSampleText,
                          onClick: async () => {
                            if (!newSampleSite || !newSampleText) { alert('사이트명과 주문서 텍스트를 입력하세요'); return; }
                            setNewSampleSaving(true);
                            const orderNumberPattern = extractPattern(newSampleText, newSampleOrderNum, 'orderNumber');
                            const pricePattern = extractPattern(newSampleText, newSamplePriceRaw || newSamplePrice, 'price');
                            const receiverPattern = extractPattern(newSampleText, newSampleReceiver, 'receiver');
                            const getLabel = (p) => p ? p.replace(/[\\\[\]()?+*{}|]/g,'').replace(/\\s\*/g,'').trim() : '';
                            const ok = await saveSiteSample(
                              newSampleSite, newSampleText,
                              getLabel(orderNumberPattern), getLabel(pricePattern), getLabel(receiverPattern),
                              orderNumberPattern, pricePattern, receiverPattern
                            );
                            setNewSampleSaving(false);
                            if (ok) {
                              setNewSampleSite(''); setNewSampleText('');
                              setNewSampleOrderNum(''); setNewSamplePrice('');
                              setNewSamplePriceRaw(''); setNewSampleReceiver('');
                              alert(`✅ "${newSampleSite}" 샘플이 등록되었습니다!`);
                            }
                          },
                          style: {
                            padding: '0.65rem 1.5rem', border: 'none', borderRadius: '6px',
                            background: newSampleSaving ? '#94a3b8' : '#3b82f6', color: 'white',
                            cursor: newSampleSaving ? 'not-allowed' : 'pointer', fontWeight: '600'
                          }
                        }, newSampleSaving ? '저장 중...' : '✅ 샘플 저장')
                      )
                    );
                  })()
                )
              )
            )
          )
        )
      );
    };

    ReactDOM.render(
      React.createElement(OrderManager),
      document.getElementById('root')
    );
  </script>
</body>
</html>
