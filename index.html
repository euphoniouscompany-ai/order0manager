<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 관리 시스템</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 기본값 (admin 시트 로딩 실패 시 사용)
    // Apps Script에서 로드될 때까지 빈 값
    const DEFAULT_PRESETS = {};
    const DEFAULT_SITES = [];
    const DEFAULT_IDS = [];
    const DEFAULT_CARDS = [];
    const DEFAULT_DELIVERY_TYPES = [];
    const DEFAULT_REVIEW_METHODS = [];
    const DEFAULT_REVIEW_FEES = [];

    // ════════════════════════════════
    // 공용 관리 탭 컴포넌트들
    // ════════════════════════════════

    const SharedUsersTab = ({ users, setUsers, sharedJsonpCall, loadSharedConfig }) => {
      const [name, setName] = React.useState('');
      const [url, setUrl] = React.useState('');
      const [saving, setSaving] = React.useState(false);

      const save = async () => {
        if (!name.trim()) return alert('사용자명을 입력하세요');
        setSaving(true);
        try {
          await sharedJsonpCall('saveUser', { name: name.trim(), personalUrl: url.trim() });
          await loadSharedConfig();
          setName(''); setUrl('');
        } catch(e) { alert('저장 실패: ' + e.message); }
        setSaving(false);
      };

      const del = async (userName) => {
        if (!confirm(`"${userName}" 삭제할까요?`)) return;
        await sharedJsonpCall('deleteUser', { name: userName });
        await loadSharedConfig();
      };

      return React.createElement('div', null,
        // 사용자 목록
        React.createElement('div', { style: { marginBottom: '1.5rem' } },
          users.length === 0
            ? React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.9rem' } }, '등록된 사용자 없음')
            : users.map(u => React.createElement('div', {
                key: u.name,
                style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.6rem 0.8rem', border: '1px solid #e2e8f0', borderRadius: '6px', marginBottom: '0.4rem' }
              },
                React.createElement('div', null,
                  React.createElement('div', { style: { fontWeight: '600', fontSize: '0.9rem' } }, '👤 ' + u.name),
                  React.createElement('div', { style: { fontSize: '0.75rem', color: '#94a3b8', marginTop: '0.2rem' } }, u.personalUrl || '개인 URL 없음')
                ),
                React.createElement('button', {
                  onClick: () => del(u.name),
                  style: { border: 'none', background: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '1.1rem' }
                }, '🗑️')
              ))
        ),
        // 추가 폼
        React.createElement('div', { style: { borderTop: '1px solid #e2e8f0', paddingTop: '1rem' } },
          React.createElement('p', { style: { fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.8rem' } }, '+ 사용자 추가'),
          React.createElement('input', {
            type: 'text', value: name, onChange: e => setName(e.target.value),
            placeholder: '사용자명 (예: 이해운)',
            style: { width: '100%', padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', marginBottom: '0.5rem', boxSizing: 'border-box', fontSize: '0.9rem' }
          }),
          React.createElement('input', {
            type: 'text', value: url, onChange: e => setUrl(e.target.value),
            placeholder: '개인 Apps Script URL',
            style: { width: '100%', padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', marginBottom: '0.8rem', boxSizing: 'border-box', fontSize: '0.9rem' }
          }),
          React.createElement('button', {
            onClick: save, disabled: saving,
            style: { padding: '0.5rem 1.2rem', background: '#3b82f6', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.9rem' }
          }, saving ? '저장 중...' : '저장')
        )
      );
    };

    const SharedSiteManagerTab = ({ SITE_DATA, setSITE_DATA, sharedJsonpCall, loadSharedConfig,
      extractPriceCandidates, extractFixedTexts, extractPattern,
      newSampleSite, setNewSampleSite, newSampleText, setNewSampleText,
      newSampleOrderNum, setNewSampleOrderNum, newSamplePrice, setNewSamplePrice,
      newSamplePriceRaw, setNewSamplePriceRaw, newSampleReceiver, setNewSampleReceiver,
      SITES, setSITES }) => {

      const [saving, setSaving] = React.useState(false);

      const deleteSite = async (site) => {
        if (!confirm(`"${site}" 학습 데이터를 삭제할까요?`)) return;
        try {
          const result = await sharedJsonpCall('deleteSharedSiteSample', { site });
          if (result.success) {
            setSITE_DATA(prev => { const n = {...prev}; delete n[site]; return n; });
          } else {
            alert('삭제 실패: ' + result.error);
          }
        } catch(e) { alert('삭제 실패: ' + e.message); }
      };

      const saveNew = async () => {
        if (!newSampleSite.trim() || !newSampleText.trim() || !newSampleOrderNum || !newSamplePrice) {
          alert('사이트명, 주문서, 주문번호, 금액을 모두 입력하세요');
          return;
        }
        setSaving(true);
        try {
          const fixedTexts = extractFixedTexts(newSampleText);
          const orderNumberPattern = extractPattern(newSampleText, newSampleOrderNum, 'orderNumber');
          const pricePattern = extractPattern(newSampleText, newSamplePriceRaw || newSamplePrice, 'price');
          const receiverPattern = extractPattern(newSampleText, newSampleReceiver, 'receiver');
          const getLabel = (p) => p ? p.replace(/[\[\]()?+*{}|\\]/g, '').replace(/\s\*/g,'').trim() : '';

          const trimmedTexts2 = [];
          let jsonLen2 = 2;
          for (const t of fixedTexts) {
            const item = JSON.stringify(t) + ',';
            if (jsonLen2 + item.length > 500) break;
            trimmedTexts2.push(t);
            jsonLen2 += item.length;
          }
          const encodePattern2 = (p) => p ? btoa(unescape(encodeURIComponent(p))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '') : '';
          const result = await sharedJsonpCall('saveSharedSiteSample', {
            site: newSampleSite.trim(),
            fixedTexts: btoa(unescape(encodeURIComponent(JSON.stringify(trimmedTexts2)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, ''),
            orderNumberLabel: getLabel(orderNumberPattern),
            priceLabel: getLabel(pricePattern),
            receiverLabel: getLabel(receiverPattern),
            orderNumberPattern: encodePattern2(orderNumberPattern),
            pricePattern: encodePattern2(pricePattern),
            receiverPattern: encodePattern2(receiverPattern),
            phonePattern: '',
            addressPattern: ''
          });
          if (result.success) {
            setSITE_DATA(prev => ({
              ...prev,
              [newSampleSite.trim()]: {
                fixedTexts,
                orderNumberLabel: getLabel(orderNumberPattern),
                priceLabel: getLabel(pricePattern),
                receiverLabel: getLabel(receiverPattern),
                orderNumber: orderNumberPattern || '',
                price: pricePattern || '',
                receiver: receiverPattern || ''
              }
            }));
            if (!SITES.includes(newSampleSite.trim())) setSITES(prev => [...prev, newSampleSite.trim()]);
            setNewSampleSite(''); setNewSampleText(''); setNewSampleOrderNum('');
            setNewSamplePrice(''); setNewSamplePriceRaw(''); setNewSampleReceiver('');
          } else {
            alert('저장 실패: ' + result.error);
          }
        } catch(e) { alert('저장 실패: ' + e.message); }
        setSaving(false);
      };

      const inText = (val) => val && newSampleText.includes(val);
      const priceCands = newSampleText ? extractPriceCandidates(newSampleText) : [];

      return React.createElement('div', null,
        // 등록된 사이트 목록
        Object.keys(SITE_DATA).length === 0
          ? React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.85rem', marginBottom: '1rem' } }, '등록된 학습 데이터 없음')
          : React.createElement('div', { style: { marginBottom: '1.5rem' } },
              Object.entries(SITE_DATA).map(([site, data]) =>
                React.createElement('div', {
                  key: site,
                  style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.6rem 0.8rem', border: '1px solid #e2e8f0', borderRadius: '8px', marginBottom: '0.4rem', background: '#f8fafc' }
                },
                  React.createElement('div', null,
                    React.createElement('span', { style: { fontWeight: '600', color: '#1e293b' } }, site),
                    React.createElement('span', { style: { marginLeft: '0.8rem', fontSize: '0.78rem', color: '#64748b' } },
                      `주문번호: ${data.orderNumberLabel || '-'} | 금액: ${data.priceLabel || '-'} | 수취인: ${data.receiverLabel || '-'}`
                    )
                  ),
                  React.createElement('button', {
                    onClick: () => deleteSite(site),
                    style: { border: '1px solid #fca5a5', borderRadius: '6px', background: '#fef2f2', color: '#dc2626', cursor: 'pointer', fontSize: '0.8rem', padding: '0.25rem 0.6rem' }
                  }, '🗑️ 삭제')
                )
              )
            ),
        // 새 사이트 등록
        React.createElement('div', { style: { borderTop: '1px solid #e2e8f0', paddingTop: '1rem' } },
          React.createElement('p', { style: { fontSize: '0.8rem', fontWeight: '600', color: '#475569', marginBottom: '0.75rem' } }, '➕ 새 사이트 등록'),
          React.createElement('input', {
            type: 'text', value: newSampleSite, onChange: e => setNewSampleSite(e.target.value),
            placeholder: '사이트명 (예: 티몬)',
            style: { width: '100%', padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', fontSize: '0.85rem', boxSizing: 'border-box', marginBottom: '0.5rem' }
          }),
          React.createElement('textarea', {
            value: newSampleText, onChange: e => setNewSampleText(e.target.value),
            placeholder: '주문서 전체 텍스트 붙여넣기',
            rows: 4,
            style: { width: '100%', padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', fontSize: '0.82rem', boxSizing: 'border-box', resize: 'vertical', marginBottom: '0.5rem' }
          }),
          React.createElement('div', { style: { display: 'flex', gap: '0.5rem', marginBottom: '0.5rem' } },
            React.createElement('div', { style: { flex: 1 } },
              React.createElement('input', {
                type: 'text', value: newSampleOrderNum, onChange: e => setNewSampleOrderNum(e.target.value),
                placeholder: '주문번호',
                style: { width: '100%', padding: '0.5rem', boxSizing: 'border-box', borderRadius: '6px', fontSize: '0.85rem', border: !newSampleOrderNum ? '1px solid #e2e8f0' : inText(newSampleOrderNum) ? '2px solid #10b981' : '2px solid #f59e0b' }
              })
            ),
            React.createElement('div', { style: { flex: 1 } },
              priceCands.length > 0 && React.createElement('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '0.25rem', marginBottom: '0.3rem' } },
                priceCands.map((c, i) => React.createElement('button', {
                  key: i, onClick: () => { setNewSamplePrice(c.value); setNewSamplePriceRaw(c.rawValue); },
                  style: { padding: '0.15rem 0.5rem', fontSize: '0.75rem', cursor: 'pointer', borderRadius: '12px', border: newSamplePrice === c.value ? '2px solid #3b82f6' : '1px solid #cbd5e1', background: newSamplePrice === c.value ? '#eff6ff' : 'white', color: newSamplePrice === c.value ? '#1d4ed8' : '#475569' }
                }, `${c.label}: ${Number(c.value).toLocaleString()}원`))
              ),
              React.createElement('input', {
                type: 'text', value: newSamplePrice, onChange: e => { const v = e.target.value.replace(/,/g,''); setNewSamplePrice(v); setNewSamplePriceRaw(v); },
                placeholder: '결제금액',
                style: { width: '100%', padding: '0.5rem', boxSizing: 'border-box', borderRadius: '6px', fontSize: '0.85rem', border: !newSamplePrice ? '1px solid #e2e8f0' : inText(newSamplePriceRaw||newSamplePrice) ? '2px solid #10b981' : '2px solid #f59e0b' }
              })
            ),
            React.createElement('div', { style: { flex: 1 } },
              React.createElement('input', {
                type: 'text', value: newSampleReceiver, onChange: e => setNewSampleReceiver(e.target.value),
                placeholder: '수취인',
                style: { width: '100%', padding: '0.5rem', boxSizing: 'border-box', borderRadius: '6px', fontSize: '0.85rem', border: !newSampleReceiver ? '1px solid #e2e8f0' : inText(newSampleReceiver) ? '2px solid #10b981' : '2px solid #f59e0b' }
              })
            )
          ),
          React.createElement('div', { style: { display: 'flex', justifyContent: 'flex-end' } },
            React.createElement('button', {
              onClick: saveNew, disabled: saving,
              style: { padding: '0.5rem 1.2rem', background: '#3b82f6', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.85rem', fontWeight: '600' }
            }, saving ? '저장 중...' : '✅ 저장')
          )
        )
      );
    };

    const SharedSitesTab = ({ sharedConfig, sharedJsonpCall, loadSharedConfig }) => {
      const sites = sharedConfig?.sharedSites || [];
      const [newSite, setNewSite] = React.useState('');
      const [saving, setSaving] = React.useState(false);

      const save = async () => {
        if (!newSite.trim()) return;
        setSaving(true);
        const updated = [...sites, newSite.trim()].join(',');
        await sharedJsonpCall('saveSharedSites', { sites: updated });
        await loadSharedConfig();
        setNewSite('');
        setSaving(false);
      };

      const del = async (site) => {
        if (!confirm(`"${site}" 삭제할까요?`)) return;
        const updated = sites.filter(s => s !== site).join(',');
        await sharedJsonpCall('saveSharedSites', { sites: updated });
        await loadSharedConfig();
      };


      return React.createElement('div', null,
        // 현재 목록
        sites.length === 0
          ? React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.9rem', marginBottom: '1rem' } }, '등록된 공용 사이트 없음')
          : React.createElement('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: '1rem' } },
              sites.map(s => React.createElement('span', {
                key: s,
                style: { display: 'inline-flex', alignItems: 'center', gap: '0.3rem', padding: '0.3rem 0.7rem', background: '#f1f5f9', borderRadius: '20px', fontSize: '0.85rem' }
              },
                s,
                React.createElement('button', {
                  onClick: () => del(s),
                  style: { border: 'none', background: 'none', cursor: 'pointer', color: '#ef4444', fontSize: '0.8rem', padding: 0 }
                }, '✕')
              ))
            ),

        // 개별 추가
        React.createElement('div', { style: { display: 'flex', gap: '0.5rem' } },
          React.createElement('input', {
            type: 'text', value: newSite,
            onChange: e => setNewSite(e.target.value),
            onKeyDown: e => e.key === 'Enter' && save(),
            placeholder: '새 사이트명 입력 후 추가',
            style: { flex: 1, padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', fontSize: '0.9rem' }
          }),
          React.createElement('button', {
            onClick: save, disabled: saving,
            style: { padding: '0.5rem 1rem', background: '#3b82f6', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.9rem' }
          }, saving ? '저장 중' : '추가')
        )
      );
    };

    const SharedLabelMappingsTab = ({ sharedConfig, sharedLabelMap, sharedJsonpCall, loadSharedConfig }) => {
      const [labelName, setLabelName] = React.useState('');
      const [mappingKey, setMappingKey] = React.useState('');
      const [saving, setSaving] = React.useState(false);

      const DATA_KEYS = [
        'name','receiver','orderNumber','personId','nickname',
        'phone','phoneNoHyphen','address','price','site','card',
        'bank','accountWithHyphen','account','accountHolder',
        '__BANK_ACCOUNT_HOLDER__','__BANK_ACCOUNT_HOLDER_NO_HYPHEN__',
        'deliveryType','reviewMethod','reviewFee'
      ];

      const entries = Object.entries(sharedLabelMap);

      const save = async () => {
        if (!labelName.trim() || !mappingKey.trim()) return alert('라벨명과 매핑키를 입력하세요');
        setSaving(true);
        try {
          await sharedJsonpCall('saveSharedLabelMapping', { labelName: labelName.trim(), mappingKey: mappingKey.trim() });
          await loadSharedConfig();
          setLabelName(''); setMappingKey('');
        } catch(e) { alert('저장 실패: ' + e.message); }
        setSaving(false);
      };

      const del = async (lbl) => {
        if (!confirm(`"${lbl}" 삭제할까요?`)) return;
        await sharedJsonpCall('deleteSharedLabelMapping', { labelName: lbl });
        await loadSharedConfig();
      };

      return React.createElement('div', null,
        React.createElement('p', { style: { fontSize: '0.8rem', color: '#64748b', marginBottom: '0.8rem' } },
          '주문서 텍스트의 라벨을 절대값(영문키)에 연결합니다. 두 사람이 공유합니다.'),
        // 목록
        entries.length === 0
          ? React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.85rem', marginBottom: '1rem' } }, '등록된 라벨 매핑 없음')
          : React.createElement('div', {
              style: { maxHeight: '200px', overflowY: 'auto', marginBottom: '1rem', border: '1px solid #e2e8f0', borderRadius: '6px' }
            },
              entries.map(([lbl, key]) =>
                React.createElement('div', {
                  key: lbl,
                  style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.35rem 0.7rem', borderBottom: '1px solid #f1f5f9', fontSize: '0.83rem' }
                },
                  React.createElement('span', null,
                    React.createElement('b', null, lbl), ` → `, React.createElement('code', { style: { color: '#7c3aed', fontSize: '0.8rem' } }, key)
                  ),
                  React.createElement('button', {
                    onClick: () => del(lbl),
                    style: { border: 'none', background: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '0.9rem' }
                  }, '🗑️')
                )
              )
            ),
        // 추가
        React.createElement('div', { style: { display: 'flex', gap: '0.5rem', alignItems: 'center' } },
          React.createElement('input', {
            type: 'text', value: labelName, onChange: e => setLabelName(e.target.value),
            onKeyDown: e => e.key === 'Enter' && save(),
            placeholder: '라벨명 (예: 받는분)',
            style: { flex: 1, padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', fontSize: '0.85rem' }
          }),
          React.createElement('select', {
            value: mappingKey, onChange: e => setMappingKey(e.target.value),
            style: { padding: '0.5rem', border: '1px solid #e2e8f0', borderRadius: '6px', fontSize: '0.85rem' }
          },
            React.createElement('option', { value: '' }, '절대값 선택'),
            DATA_KEYS.map(k => React.createElement('option', { key: k, value: k }, k))
          ),
          React.createElement('button', {
            onClick: save, disabled: saving,
            style: { padding: '0.5rem 1rem', background: '#3b82f6', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '0.85rem' }
          }, saving ? '저장 중' : '추가')
        )
      );
    };

    const SharedFormMappingsTab = ({ sharedConfig, sharedJsonpCall, loadSharedConfig }) => {
      // formMappings는 이제 { label: dataKey } 플랫 구조
      const mappings = sharedConfig?.formMappings || {};
      const [label, setLabel] = React.useState('');
      const [dataKey, setDataKey] = React.useState('');
      const [saving, setSaving] = React.useState(false);

      const DATA_KEYS = [
        { key: 'receiver', label: '수취인' },
        { key: 'price', label: '결제금액' },
        { key: 'orderNumber', label: '주문번호' },
        { key: 'site', label: '사이트' },
        { key: 'bank', label: '은행명' },
        { key: 'accountWithHyphen', label: '계좌번호(-)' },
        { key: 'accountHolder', label: '계좌 성함' },
        { key: 'phone', label: '전화번호' },
        { key: 'address', label: '주소' },
      ];

      const save = async () => {
        if (!label.trim() || !dataKey) return alert('라벨과 데이터를 모두 선택하세요');
        setSaving(true);
        try {
          await sharedJsonpCall('saveFormMapping', { label: label.trim(), dataKey });
          await loadSharedConfig();
          setLabel(''); setDataKey('');
        } catch(e) { alert('저장 실패: ' + e.message); }
        setSaving(false);
      };

      const del = async (lbl) => {
        if (!confirm(`"${lbl}" 삭제할까요?`)) return;
        await sharedJsonpCall('deleteFormMapping', { label: lbl });
        await loadSharedConfig();
      };

      // 전체 매핑 목록 (라벨→데이터키 플랫)
      const entries = Object.entries(mappings).filter(([k]) => k !== 'undefined');

      return React.createElement('div', null,
        React.createElement('p', { style: { fontSize: '0.8rem', color: '#64748b', marginBottom: '0.8rem' } },
          '폼에 나타나는 라벨 텍스트와 주문 데이터를 연결합니다. 어떤 폼이든 동일한 라벨이면 자동 적용됩니다.'),
        // 저장된 매핑 목록
        entries.length > 0
          ? React.createElement('div', { style: { marginBottom: '1rem' } },

// ── 공용 JSONP 호출 ──
const sharedJsonpCall = (action, params = {}) => {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_shared_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('Timeout'));
    }, 10000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      resolve(data);
    };
    const allParams = { action, ...params, callback: cbName };
    const qs = Object.entries(allParams)
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    const script = document.createElement('script');
    script.src = SHARED_SCRIPT_URL + '?' + qs;
    script.onerror = () => { clearTimeout(timeout); reject(new Error('Script load failed')); };
    document.body.appendChild(script);
  });
};

    // 패턴 자동 추출 함수
    const extractPattern = (fullText, targetValue, fieldType) => {
      if (!targetValue) return '';

      // 전화번호: 숫자만 추출해서 검색
      let searchValue = targetValue;
      if (fieldType === 'phone') {
        const digits = targetValue.replace(/[^\d]/g, '');
        if (digits.length >= 10) {
          // 숫자만으로 패턴 생성 (하이픈/공백 무시)
          const digitPattern = digits.split('').join('[\\s\\-]?');
          return `(${digitPattern})`;
        }
      }

      if (!fullText.includes(searchValue)) {
        console.warn(`⚠️ "${targetValue}"를 찾을 수 없습니다`);
        return '';
      }
      
      const index = fullText.indexOf(searchValue);
      
      // 줄바꿈 기준으로 해당 줄에서 앞 텍스트만 사용
      const lineStart = fullText.lastIndexOf('\n', index) + 1;
      const before = fullText.substring(lineStart, index);
      
      console.log(`패턴 추출: "${targetValue}"`);
      console.log(`  줄 앞: "${before}"`);
      
      // 줄바꿈, 탭, 여러 공백 제거
      const beforeCleaned = before.replace(/[\n\t]/g, ' ').replace(/\s+/g, ' ').trim();
      
      // 마지막 단어만 추출
      const words = beforeCleaned.split(' ');
      const label = words[words.length - 1] || '';
      
      console.log(`  정제된 앞: "${beforeCleaned}"`);
      console.log(`  라벨: "${label}"`);
      
      // 값 타입별 패턴
      let valuePattern = '';
      if (fieldType === 'orderNumber') {
        valuePattern = '([\\w\\d\\-]+)';
      } else if (fieldType === 'price') {
        valuePattern = '([\\d,]+)';
      } else if (fieldType === 'receiver') {
        // 수취인: 라벨이 문장형이면 저장 안 함
        const isBadLabel = !label || label.length > 5 || /[습니다요은는이가을를의.]$/.test(label);
        if (isBadLabel) {
          // 라벨이 없는 경우 — 이전 줄을 라벨로 사용 (테무: "배송지\n이해운+82...")
          const lines = fullText.substring(0, index).split('\n');
          const prevLine = lines[lines.length - 2] ? lines[lines.length - 2].trim() : '';
          const isGoodPrevLine = prevLine && prevLine.length <= 6 && !/[습니다요은는이가을를의]$/.test(prevLine);
          if (isGoodPrevLine) {
            // 이전 줄 기반 패턴: "배송지\n이해운"
            return prevLine + '\\s*\\n([가-힣]{2,5})';
          }
          // 이름 뒤에 전화번호/+82 붙는 패턴: "이해운+82"
          const afterValue = fullText.substring(index + searchValue.length, index + searchValue.length + 5);
          if (/^[+\s]*82/.test(afterValue) || /^[\s]*0\d/.test(afterValue)) {
            return '([가-힣]{2,5})(?=[+\\s]*82|[\\s]*0\\d)';
          }
          console.log('  수취인 라벨 부적합 → 패턴 저장 안 함');
          return '';
        }
        // 실제 구분자 확인 (탭이면 탭, 공백이면 공백)
        const charAfterLabel = fullText.substring(index - searchValue.length - 1, index - searchValue.length + 1);
        if (/\t/.test(charAfterLabel) || /\t/.test(fullText.substring(fullText.lastIndexOf(label, index), index + 1))) {
          // 탭 구분자 → 탭 이후 내용 전체 (가장 정확)
          return label + '\\t([^\\t\\n]+)';
        }
        valuePattern = '([가-힣]{2,5})';
      } else if (fieldType === 'address') {
        valuePattern = '([가-힣0-9\\s\\-\\(\\)]+?)(?=\\s*\\n|$)';
      } else {
        valuePattern = '([^\\t\\n]+)';
      }
      
      // 구분자: 라벨과 값 사이
      let separator = '';
      const lastChar = beforeCleaned.slice(-1);
      
      if (lastChar === ':' || lastChar === '：') {
        separator = '[:\\：]\\s*';
      } else if (label && /[가-힣a-zA-Z]/.test(lastChar)) {
        separator = '\\s*';
      } else {
        separator = '\\s*';
      }
      
      const pattern = label + separator + valuePattern;
      console.log(`  최종 패턴: "${pattern}"`);
      
      return pattern;
    };

    // 고정텍스트 추출 (숫자/이름/주소 등 변동값 제거, 2자 이상 한글/영문 단어만)
    const extractFixedTexts = (text) => {
      // 숫자, 전화번호, 날짜, 금액, 주소 등 변동값 제거
      const cleaned = text
        .replace(/\d{3,}/g, '')          // 3자리 이상 숫자
        .replace(/[가-힣]{1,2}(?=\s|$)/g, '') // 1-2자 한글 (이름 등)
        .replace(/https?:\/\/\S+/g, '')  // URL
        .replace(/[^\uAC00-\uD7A3a-zA-Z\s]/g, ' ') // 특수문자 제거
        .replace(/\s+/g, ' ').trim();
      // 2자 이상 단어만 추출
      const words = cleaned.split(/\s+/).filter(w => w.length >= 2);
      return [...new Set(words)]; // 중복 제거
    };

    // 두 고정텍스트 배열의 Jaccard 유사도 계산
    const calcSimilarity = (arr1, arr2) => {
      if (!arr1.length || !arr2.length) return 0;
      const set1 = new Set(arr1);
      const set2 = new Set(arr2);
      const intersection = [...set1].filter(x => set2.has(x)).length;
      const union = new Set([...set1, ...set2]).size;
      return intersection / union;
    };

    // 범용 파싱 함수
    const parseOrderText = (text) => {
      const result = {
        site: '',
        orderNumber: '',
        price: '',
        receiver: '',
        phone: '',
        address: '',
        detected: false,
        matchType: ''  // 'known' | 'changed' | ''
      };

      // ── 1순위: 샘플 유사도로 사이트 감지 ──
      const inputFixed = extractFixedTexts(text);
      let bestSite = '';
      let bestScore = 0;
      const THRESHOLD = 0.15; // 15% 이상이면 인식
      Object.entries(SITE_DATA).forEach(([site, data]) => {
        if (data.fixedTexts && data.fixedTexts.length > 0) {
          const score = calcSimilarity(inputFixed, data.fixedTexts);
          if (score > bestScore) { bestScore = score; bestSite = site; }
        }
      });
      if (bestScore >= THRESHOLD) {
        result.site = bestSite;
        result.matchType = 'sample'; // 나중에 패턴 추출 결과로 덮어씀
        console.log(`✅ 유사도 인식: ${bestSite} (${(bestScore*100).toFixed(1)}%)`);

          } catch (e) {
            console.warn('금액 패턴 오류:', e);
          }
        }
        
        if (patterns.receiver) {

            const regex = new RegExp(patterns.receiver, 'im');
            const match = text.match(regex);
            if (match && match[1]) {
              result.receiver = match[1].trim();
            }
          } catch (e) {
            console.warn('수취인 패턴 오류:', e);
          }
        }
        
        if (patterns.phone) {
          try {
            const regex = new RegExp(patterns.phone, 'i');
            const match = text.match(regex);
            if (match && match[1]) result.phone = match[1].trim();
          } catch(e) {}
        }
        if (patterns.address) {
          try {
            const regex = new RegExp(patterns.address, 'i');
            const match = text.match(regex);
            if (match && match[1]) result.address = match[1].trim();
          } catch(e) {}
        }

        // 패턴으로 파싱 성공하면 반환
        if (result.orderNumber && result.price) {
          result.detected = true;
          result.matchType = 'known';
          console.log('✅ 시트 패턴으로 파싱 성공:', result);
          return result;
        }

      }

      // 기본 패턴으로 fallback

      // 지마켓: 장바구니번호와 주문번호 둘 다 추출
      if (result.site === '지마켓') {
        const cartMatch = text.match(/장바구니번호\s*(\d{10,})/i);
        const orderMatch = text.match(/주문번호\s*(\d{10,})/i);
        
        if (cartMatch && cartMatch[1]) {
          result.cartNumber = cartMatch[1];
        }
        if (orderMatch && orderMatch[1]) {
          result.orderNumber = orderMatch[1];
        }

      if (!result.orderNumber) {

          /주문번호\s*(\d{10,})/i,              // 쿠팡: "주문번호 21100171701760"
          /주문\s*번호[:\s]*(\d{10,})/i,
          /order[:\s]*(?:no|number)[:\s]*(\d{10,})/i,
          /번호[:\s]*(\d{10,})/i,
          /(\d{14,20})/                         // 14-20자리 숫자 (쿠팡 주문번호)
        ];

        for (const pattern of orderPatterns) {
          const match = text.match(pattern);
          if (match && match[1]) {
            result.orderNumber = match[1];
            break;
          }
        }
      }

      // 금액 추출
      const pricePatterns = [
        // ₩ 기호 패턴
        /합계\s*₩\s*([\d,]+)/i,
        /₩\s*([\d,]+)/,
        // 네이버페이: 카드 간편결제 / 신용카드 뒤의 금액
        /(?:카드\s*간편결제|신용카드|체크카드)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /(?:카드\s*간편결제|신용카드|체크카드)[^\d]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        // 계좌이체
        /(?:계좌이체|무통장입금)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        // 네이버페이: 주문금액 섹션
        /주문금액[^\d]*총\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        // 쿠팡: 상품금액 / 결제금액
        /상품금액\s*\n?\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /쿠팡캐시[^\n]*\n[^\n]*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        // 쿠팡: 총 결제금액 바로 뒤에 숫자 (공백 없이 붙는 형태)
        /총\s*결제금액\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /총\s*결제\s*금액\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        // 일반 패턴
        /총\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /최종\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /total[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i
      ];

      for (const pattern of pricePatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.price = match[1].replace(/,/g, '');
          break;
        }
      }

      // 수취인 추출
      const receiverPatterns = [
        /받는사람\t([^\t\n]+)/i,              // 쿠팡: "받는사람\t정동신\t" (탭 구분)
        /받는사람\s{2,}([^\s\n][^\n]*)/i,    // 쿠팡: "받는사람   정동신"

        /([가-힣]{2,5})\+?82/,          // 이해운+82 010...
        /([가-힣]{2,5})\s+0\d{1,2}\s\d{3,4}\s\d{4}/,  // 이해운 010 7169 7838
        /배송지\s*\n([가-힣]{2,5})/,   // 배송지 다음 줄 이름
      ];

      for (const pattern of receiverPatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.receiver = match[1].trim();
          break;
        }
      }

      // 수취인 패턴 실패 시 PRESETS 이름으로 직접 검색

        /연락처\s*(010[-\s]?\d{4}[-\s]?\d{4})/i,  // 쿠팡
        /(010[-\s]?\d{4}[-\s]?\d{4})/
      ];

            result.address = addr;
            break;
          }
        }

                const matched = parsedTokens.filter(t => fullTokens.some(f => f.includes(t) || t.includes(f))).length;

      // 개인 Apps Script JSONP 호출
      const jsonpCall = (params) => new Promise((resolve, reject) => {
        const url = getPersonalUrl();
        if (!url) { reject(new Error('사용자를 먼저 선택해주세요')); return; }
        const cbName = 'cb_' + Date.now();
        const timeout = setTimeout(() => {
          delete window[cbName];
          reject(new Error('Timeout'));
        }, 10000);
        window[cbName] = (data) => {
          clearTimeout(timeout);
          delete window[cbName];
          resolve(data);
        };
        const qs = Object.entries({...params, callback: cbName})
          .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
        const script = document.createElement('script');
        script.src = url + '?' + qs;
        script.onerror = () => { clearTimeout(timeout); reject(new Error('Script load failed')); };
        document.body.appendChild(script);

      // 주문서 패턴 저장
      // 텍스트에서 수취인 후보 추출 (라벨 + 한글 이름)
      const extractReceiverCandidates = (text) => {
        const candidates = [];
        const seen = new Set();
        const pattern = /([가-힣a-zA-Z\s]{1,12})[:\t\s]+([가-힣]{2,5})(?=[\s\t\n\(]|$)/g;
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const label = match[1].replace(/[\n\t]/g, ' ').trim();
          const value = match[2].trim();
          if (!seen.has(value) && label.length >= 2) {
            seen.add(value);
            candidates.push({ label, value });
          }
        }
        return candidates;
      };

      // 텍스트에서 주문번호 후보 추출 (라벨 + 숫자)
      const extractOrderNumberCandidates = (text) => {
        const candidates = [];
        const seen = new Set();
        // 라벨 + 숫자 패턴 (8자리 이상 숫자, 하이픈 포함)
        const patterns = [
          /([가-힣a-zA-Z\s]{1,12})[:\t\s]+([\d-]{8,})/g,
        ];
        for (const pattern of patterns) {
          let match;
          while ((match = pattern.exec(text)) !== null) {
            const label = match[1].replace(/[\n\t]/g, ' ').trim();
            const value = match[2].trim();
            if (!seen.has(value) && label.length >= 2) {
              seen.add(value);
              candidates.push({ label, value });
            }
          }
        }
        return candidates;
      };

      // 텍스트에서 금액 후보 추출 (라벨 + 숫자) - rawValue는 원본(콤마포함), value는 숫자만
      const extractPriceCandidates = (text) => {
        const candidates = [];
        const seen = new Set();
        const patterns = [
          /([가-힣a-zA-Z\s\(\)]{1,15})[:\t\s]+([\d,]{3,})\s*원/g,
          /([가-힣a-zA-Z\s\(\)]{1,15})[:\t\s]+([\d,]{3,})(?!\d)/g,
          // 쿠팡: 라벨과 숫자 사이 구분자 없이 붙는 형태 (총 결제금액12,900 원)
          /([가-힣]{2,10})([\d,]{4,})\s*원/g,
        ];
        for (const pattern of patterns) {
          let match;
          while ((match = pattern.exec(text)) !== null) {
            const label = match[1].replace(/[\n\t]/g, ' ').trim();
            const rawValue = match[2];
            const value = rawValue.replace(/,/g, '');
            const num = parseInt(value, 10);
            const seenKey = label + ':' + value; // 라벨+값 기준으로 중복 체크
            if (num >= 100 && num <= 10000000 && !seen.has(seenKey)) {
              seen.add(seenKey);
              candidates.push({ label, value, rawValue });
            }
          }
        }
        return candidates;
      };

                      // 라벨명 추출 (샘플용 - 패턴에서 앞부분만)
                      const getLabel = (pattern) => pattern ? pattern.replace(/[\\\[\]()?+*{}|]/g, '').replace(/\\s\*/g,'').trim() : '';
                      const phonePattern = extractPattern(learningData.rawText, learningData.phone, 'phone');
                      const addressPattern = extractPattern(learningData.rawText, learningData.address, 'address');
                      const ok = await saveSiteSample(
                        learningData.site,
                        learningData.rawText,
                        getLabel(orderNumberPattern),
                        getLabel(pricePattern),
                        getLabel(receiverPattern),
                        orderNumberPattern,
                        pricePattern,
                        receiverPattern,
                        phonePattern,
                        addressPattern
                      );
                      if (ok) setShowLearningUI(false);
                    },
                    style: {
                      padding: '0.75rem 1.5rem', border: 'none',
                      borderRadius: '6px', background: '#3b82f6',
                      color: 'white', cursor: 'pointer', fontWeight: '600', fontSize: '0.95rem'
                    }
                  }, '✅ 저장 + 적용')
                )
              )
            ),

            // ── 사용자 선택 모달 ──
            // 설정 로딩 중 오버레이
            isLoadingConfig && React.createElement('div', {
              style: {
                position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)',
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                justifyContent: 'center', zIndex: 3000, gap: '1rem'
              }
            },
              React.createElement('div', {
                style: {
                  width: '48px', height: '48px', border: '5px solid rgba(255,255,255,0.3)',
                  borderTop: '5px solid white', borderRadius: '50%',
                  animation: 'spin 0.8s linear infinite'
                }
              }),
              React.createElement('p', {
                style: { color: 'white', fontSize: '1rem', fontWeight: '500', margin: 0 }
              }, '⏳ 설정을 불러오는 중... 잠시만 기다려주세요.')
            ),

            showUserSelect && React.createElement('div', {
              style: {
                position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000
              }
            },
              React.createElement('div', {
                style: {
                  background: 'white', borderRadius: '12px', padding: '2rem',
                  width: '360px', boxShadow: '0 20px 60px rgba(0,0,0,0.3)'
                }
              },
                React.createElement('h3', { style: { margin: '0 0 0.5rem', fontSize: '1.1rem' } }, '👤 사용자 선택'),
                React.createElement('p', { style: { margin: '0 0 1.5rem', fontSize: '0.85rem', color: '#64748b' } }, 
                  currentUser ? '사용자를 변경합니다.' : '⚠️ 시작 전 사용자를 선택해주세요.'),
                users.length === 0
                  ? React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.9rem' } },
                      '등록된 사용자가 없습니다. 공용 관리에서 추가하세요.')
                  : React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.5rem' } },
                      users.map(user =>
                        React.createElement('button', {
                          key: user.name,
                          onClick: () => selectUser(user),
                          style: {
                            padding: '0.8rem 1rem', borderRadius: '8px', cursor: 'pointer',
                            border: currentUser === user.name ? '2px solid #3b82f6' : '1px solid #e2e8f0',
                            background: currentUser === user.name ? '#eff6ff' : 'white',
                            color: currentUser === user.name ? '#1d4ed8' : '#1e293b',
                            fontSize: '0.95rem', fontWeight: '500', textAlign: 'left'
                          }
                        }, `👤 ${user.name}`)
                      )
                    ),
                currentUser && React.createElement('button', {
                  onClick: () => setShowUserSelect(false),
                  style: {
                    marginTop: '1.5rem', width: '100%', padding: '0.6rem',
                    border: '1px solid #e2e8f0', borderRadius: '8px',
                    background: 'white', cursor: 'pointer', color: '#64748b'
                  }
                }, '닫기')
              )
            ),

            // ── 공용 관리 모달 ──
            showSharedManager && React.createElement('div', {
              style: {
                position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000
              }
            },
              React.createElement('div', {
                style: {
                  background: 'white', borderRadius: '12px', padding: '2rem',
                  width: '600px', maxHeight: '85vh', overflowY: 'auto',
                  boxShadow: '0 20px 60px rgba(0,0,0,0.3)'
                }
              },
                // 헤더
                React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' } },
                  React.createElement('h3', { style: { margin: 0, fontSize: '1.1rem' } }, '🌐 공용 관리'),
                  React.createElement('button', {
                    onClick: () => setShowSharedManager(false),
                    style: { border: 'none', background: 'none', fontSize: '1.3rem', cursor: 'pointer', color: '#64748b' }
                  }, '✕')
                ),

                // 탭
                React.createElement('div', { style: { display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', borderBottom: '1px solid #e2e8f0', paddingBottom: '0.5rem' } },
                  ['users', 'sites', 'labelMappings', 'formMappings'].map(tab =>
                    React.createElement('button', {
                      key: tab,
                      onClick: () => setSharedTab(tab),
                      style: {
                        padding: '0.4rem 0.8rem', borderRadius: '6px', cursor: 'pointer', fontSize: '0.85rem',
                        border: sharedTab === tab ? '2px solid #3b82f6' : '1px solid #e2e8f0',
                        background: sharedTab === tab ? '#eff6ff' : 'white',
                        color: sharedTab === tab ? '#1d4ed8' : '#64748b', fontWeight: sharedTab === tab ? '600' : '400'
                      }
                    }, tab === 'users' ? '👤 사용자' : tab === 'sites' ? '🏪 사이트 관리' : tab === 'labelMappings' ? '🏷️ 라벨 매핑' : '📋 폼 매핑')
                  )
                ),

                // ── 사용자 탭 ──
                sharedTab === 'users' && React.createElement(SharedUsersTab, {
                  users, setUsers, sharedJsonpCall, loadSharedConfig
                }),

                // ── 라벨 매핑 탭 ──
                sharedTab === 'labelMappings' && React.createElement(SharedLabelMappingsTab, {
                  sharedConfig, sharedLabelMap, sharedJsonpCall, loadSharedConfig
                }),

                // ── 공용 사이트 탭 ──
                sharedTab === 'sites' && React.createElement(SharedSiteManagerTab, {
                  SITE_DATA, setSITE_DATA, sharedJsonpCall, loadSharedConfig,
                  extractPriceCandidates, extractFixedTexts, extractPattern,
                  newSampleSite, setNewSampleSite, newSampleText, setNewSampleText,
                  newSampleOrderNum, setNewSampleOrderNum, newSamplePrice, setNewSamplePrice,
                  newSamplePriceRaw, setNewSamplePriceRaw, newSampleReceiver, setNewSampleReceiver,
                  SITES, setSITES
                }),

                // ── 폼 매핑 탭 ──
                sharedTab === 'formMappings' && React.createElement(SharedFormMappingsTab, {
                  sharedConfig, sharedJsonpCall, loadSharedConfig
                })
              )
            ),

            // ── 사이트 관리 모달 ──
            showSiteManager && React.createElement('div', {
              style: {
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.7)', display: 'flex',
                justifyContent: 'center', alignItems: 'center', zIndex: 1001
              },
              onClick: () => setShowSiteManager(false)

              React.createElement('div', {
                style: {
                  background: 'white', padding: '2rem', borderRadius: '12px',
                  width: '90%', maxWidth: '680px', maxHeight: '88vh', overflow: 'auto'
                },
                onClick: e => e.stopPropagation()
              },
                React.createElement('h2', {
                  style: { marginTop: 0, marginBottom: '0.5rem', color: '#1e293b', fontSize: '1.2rem' }

                // 등록된 샘플 목록
                Object.keys(SITE_DATA).length === 0
                  ? React.createElement('p', {
                      style: { color: '#94a3b8', fontSize: '0.9rem', padding: '1rem', background: '#f8fafc', borderRadius: '8px' }
                    }, '등록된 학습 데이터가 없습니다. 아래에서 새 사이트를 등록하세요.')
                  : React.createElement('div', { style: { marginBottom: '1.5rem' } },
                      Object.entries(SITE_DATA).map(([site, sample]) =>
                        React.createElement('div', {
                          key: site,
                          style: {
                            padding: '0.75rem 1rem', marginBottom: '0.5rem',
                            border: '1px solid #e2e8f0', borderRadius: '8px',
                            background: '#f8fafc', display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                          }
                        },
                          React.createElement('div', null,
                            React.createElement('span', { style: { fontWeight: '600', color: '#1e293b' } }, site),
                            React.createElement('span', {
                              style: { marginLeft: '1rem', fontSize: '0.8rem', color: '#64748b' }
                            }, `고정텍스트 ${sample.fixedTexts ? sample.fixedTexts.length : 0}개 | 주문번호: ${sample.orderNumberLabel || '-'} | 금액: ${sample.priceLabel || '-'} | 수취인: ${sample.receiverLabel || '-'}`)
                          ),
                          React.createElement('button', {
                            onClick: () => deleteSiteSample(site),
                            style: {
                              padding: '0.3rem 0.6rem', border: '1px solid #fca5a5',
                              borderRadius: '6px', background: '#fef2f2', color: '#dc2626',
                              cursor: 'pointer', fontSize: '0.8rem', whiteSpace: 'nowrap'
                            }
                          }, '🗑️ 삭제')
                        )
                      )
                    ),

                // 새 샘플 등록 섹션
                React.createElement('div', {
                  style: { borderTop: '1px solid #e2e8f0', paddingTop: '1.5rem' }
                },
                  React.createElement('h3', {
                    style: { margin: '0 0 1rem', fontSize: '1rem', color: '#1e293b' }
                  }, '➕ 새 사이트 샘플 등록'),
                  React.createElement('p', {
                    style: { fontSize: '0.85rem', color: '#64748b', marginBottom: '1rem' }
                  }, '1) 사이트명 입력 → 2) 주문서 텍스트 붙여넣기 → 3) 주문번호/금액/수취인 입력 → 저장'),

                  (() => {
                    const inText = (val) => val && newSampleText.includes(val);
                    const priceCands = newSampleText ? extractPriceCandidates(newSampleText) : [];

                    return React.createElement('div', null,
                      // 사이트명
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '사이트명'),
                        React.createElement('input', {
                          type: 'text', value: newSampleSite,
                          onChange: e => setNewSampleSite(e.target.value),
                          placeholder: '예: 티몬, 위메프',
                          style: { width: '100%', padding: '0.6rem', border: '1px solid #cbd5e1', borderRadius: '6px', fontSize: '0.95rem', boxSizing: 'border-box' }
                        })
                      ),
                      // 주문서 텍스트
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '주문서 텍스트'),
                        React.createElement('textarea', {
                          value: newSampleText,
                          onChange: e => setNewSampleText(e.target.value),
                          placeholder: '주문서 전체 텍스트를 붙여넣으세요',
                          rows: 5,
                          style: { width: '100%', padding: '0.6rem', border: '1px solid #cbd5e1', borderRadius: '6px', fontSize: '0.85rem', boxSizing: 'border-box', resize: 'vertical' }
                        })
                      ),
                      // 주문번호
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '주문번호'),
                        React.createElement('input', {
                          type: 'text', value: newSampleOrderNum,
                          onChange: e => setNewSampleOrderNum(e.target.value),
                          placeholder: '실제 주문번호 입력',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSampleOrderNum ? '1px solid #cbd5e1' : inText(newSampleOrderNum) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSampleOrderNum && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: inText(newSampleOrderNum) ? '#10b981' : '#f59e0b' }
                        }, inText(newSampleOrderNum) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 금액 후보 + 입력
                      React.createElement('div', { style: { marginBottom: '0.75rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '결제 금액'),
                        priceCands.length > 0 && React.createElement('div', {
                          style: { display: 'flex', flexWrap: 'wrap', gap: '0.3rem', marginBottom: '0.4rem', padding: '0.5rem', background: '#f8fafc', borderRadius: '6px', border: '1px solid #e2e8f0' }
                        },
                          React.createElement('span', { style: { width: '100%', fontSize: '0.75rem', color: '#64748b' } }, '📌 후보:'),
                          priceCands.map((c, i) => React.createElement('button', {
                            key: i,
                            onClick: () => { setNewSamplePrice(c.value); setNewSamplePriceRaw(c.rawValue); },
                            style: {
                              padding: '0.2rem 0.6rem', fontSize: '0.8rem', cursor: 'pointer', borderRadius: '16px',
                              border: newSamplePrice === c.value ? '2px solid #3b82f6' : '1px solid #cbd5e1',
                              background: newSamplePrice === c.value ? '#eff6ff' : 'white',
                              color: newSamplePrice === c.value ? '#1d4ed8' : '#475569'
                            }
                          }, `${c.label}: ${Number(c.value).toLocaleString()}원`))
                        ),
                        React.createElement('input', {
                          type: 'text', value: newSamplePrice,
                          onChange: e => { const v = e.target.value.replace(/,/g,''); setNewSamplePrice(v); setNewSamplePriceRaw(v); },
                          placeholder: '금액 숫자만',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSamplePrice ? '1px solid #cbd5e1' : newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSamplePrice && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '#10b981' : '#f59e0b' }
                        }, newSampleText.includes(newSamplePriceRaw||newSamplePrice) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 수취인
                      React.createElement('div', { style: { marginBottom: '1rem' } },
                        React.createElement('label', { style: { display: 'block', fontWeight: '600', fontSize: '0.85rem', marginBottom: '0.3rem' } }, '수취인'),
                        React.createElement('input', {
                          type: 'text', value: newSampleReceiver,
                          onChange: e => setNewSampleReceiver(e.target.value),
                          placeholder: '받는 사람 이름',
                          style: {
                            width: '100%', padding: '0.6rem', boxSizing: 'border-box',
                            border: !newSampleReceiver ? '1px solid #cbd5e1' : inText(newSampleReceiver) ? '2px solid #10b981' : '2px solid #f59e0b',
                            borderRadius: '6px', fontSize: '0.95rem'
                          }
                        }),
                        newSampleReceiver && React.createElement('p', {
                          style: { margin: '0.2rem 0 0', fontSize: '0.75rem', color: inText(newSampleReceiver) ? '#10b981' : '#f59e0b' }
                        }, inText(newSampleReceiver) ? '✅ 발견됨 — 패턴 저장됩니다' : '⚠️ 텍스트에서 찾을 수 없어요')
                      ),
                      // 저장 버튼
                      React.createElement('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: '0.75rem' } },
                        React.createElement('button', {
                          onClick: () => setShowSiteManager(false),
                          style: { padding: '0.65rem 1.5rem', border: '1px solid #cbd5e1', borderRadius: '6px', background: 'white', cursor: 'pointer' }
                        }, '닫기'),
                        React.createElement('button', {
                          disabled: newSampleSaving || !newSampleSite || !newSampleText,
                          onClick: async () => {
                            if (!newSampleSite || !newSampleText) { alert('사이트명과 주문서 텍스트를 입력하세요'); return; }
                            setNewSampleSaving(true);
                            const orderNumberPattern = extractPattern(newSampleText, newSampleOrderNum, 'orderNumber');
                            const pricePattern = extractPattern(newSampleText, newSamplePriceRaw || newSamplePrice, 'price');
                            const receiverPattern = extractPattern(newSampleText, newSampleReceiver, 'receiver');
                            const getLabel = (p) => p ? p.replace(/[\\\[\]()?+*{}|]/g,'').replace(/\\s\*/g,'').trim() : '';
                            const ok = await saveSiteSample(
                              newSampleSite, newSampleText,
                              getLabel(orderNumberPattern), getLabel(pricePattern), getLabel(receiverPattern),
                              orderNumberPattern, pricePattern, receiverPattern
                            );
                            setNewSampleSaving(false);
                            if (ok) {
                              setNewSampleSite(''); setNewSampleText('');
                              setNewSampleOrderNum(''); setNewSamplePrice('');
                              setNewSamplePriceRaw(''); setNewSampleReceiver('');
                              alert(`✅ "${newSampleSite}" 샘플이 등록되었습니다!`);
                            }
                          },
                          style: {
                            padding: '0.65rem 1.5rem', border: 'none', borderRadius: '6px',
                            background: newSampleSaving ? '#94a3b8' : '#3b82f6', color: 'white',
                            cursor: newSampleSaving ? 'not-allowed' : 'pointer', fontWeight: '600'
                          }
                        }, newSampleSaving ? '저장 중...' : '✅ 샘플 저장')
                      )
                    );
                  })()
                )
              )
            )
          )
        )
      );
    };

    ReactDOM.render(
      React.createElement(OrderManager),
      document.getElementById('root')
    );
  </script>
