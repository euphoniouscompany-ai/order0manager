<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 관리 시스템</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════════════════════
    // MODULE 1 · Utils — 인코딩 / 유사도 공통 기능
    // ═══════════════════════════════════════════════════════════
    const encB64 = (str) =>
      btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    const encObj = (obj) => encB64(JSON.stringify(obj));
    const encFixedTexts = (arr) => {
      const trimmed = []; let len = 2;
      for (const t of arr) {
        const item = JSON.stringify(t) + ',';
        if (len + item.length > 500) break;
        trimmed.push(t); len += item.length;
      }
      return encObj(trimmed);
    };

    // ═══════════════════════════════════════════════════════════
    // MODULE 2 · Parser — 주문서 텍스트 추출 (pure 함수, 상태 없음)
    // ═══════════════════════════════════════════════════════════

    const extractLabels = (fullText, searchValue) => {
      if (!fullText || !searchValue) return { before: '', after: '', candidates: [] };
      const lines = fullText.split('\n');
      const candidates = [];
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(searchValue)) {
          const idx = lines[i].indexOf(searchValue);
          let before = lines[i].substring(0, idx);
          const after = lines[i].substring(idx + searchValue.length).trim();
          if (!before.trim() && i > 0) before = lines[i - 1].trim();
          candidates.push({ value: searchValue, labelBefore: before, labelAfter: after, lineIdx: i });
        }
      }
      if (candidates.length === 0) return { before: '', after: '', candidates: [] };
      return { before: candidates[0].labelBefore, after: candidates[0].labelAfter, candidates };
    };

    const makePattern = (labelBefore, searchValue, labelAfter, fieldType) => {
      if (!labelBefore && !labelAfter) return '';
      const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      let vp = '([^\\t\\n]+)';
      if (fieldType === 'orderNumber') vp = '([\\w\\d\\-]+)';
      else if (fieldType === 'price') vp = '([\\d,]+)';
      else if (fieldType === 'receiver') vp = '([가-힣]{2,5})';
      else if (fieldType === 'address') vp = '([^\\n]+)'; // 주소: 줄 끝까지, 뒤 앵커 사용 안 함
      const beforeTrimmed = (labelBefore || '').trimEnd();
      const sep = (labelBefore || '').includes('\t') ? '\\t' : '\\s*';
      const before = beforeTrimmed ? esc(beforeTrimmed) + sep : '';
      // 주소는 뒤 앵커 무시 — 1층, 배송요청사항 등 주소 뒤 내용이 잘리는 문제 방지
      const after = (fieldType === 'address') ? '' : (labelAfter ? '\\s*' + esc(labelAfter) : '');
      return before + vp + after;
    };

    const extractPattern = (fullText, targetValue, fieldType) => {
      if (!targetValue) return '';
      if (fieldType === 'phone') {
        const digits = targetValue.replace(/[^\d]/g, '');
        return digits.length >= 10 ? '(' + digits.split('').join('[\\s\\-]?') + ')' : '';
      }
      let searchValue = targetValue;
      if (fieldType === 'price') {
        const digits = targetValue.replace(/[^\d]/g, '');
        const withComma = digits.replace(/(\d{1,3})(?=(\d{3})+$)/g, '$1,');
        if (fullText.includes(withComma)) searchValue = withComma;
        else if (fullText.includes(digits)) searchValue = digits;
        else return '';
      }
      if (!fullText.includes(searchValue)) return '';
      const lines = fullText.split('\n');
      let beforeValue = ''; let foundLine = false;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(searchValue)) {
          beforeValue = lines[i].substring(0, lines[i].indexOf(searchValue));
          if (!beforeValue.trim() && i > 0) beforeValue = lines[i - 1].trim();
          foundLine = true; break;
        }
      }
      if (!foundLine) return '';
      const trimmed = beforeValue.trim();
      if (!trimmed) return '';
      const escaped = trimmed.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      let vp = '([^\\t\\n]+)';
      if (fieldType === 'orderNumber') vp = '([\\w\\d\\-]+)';
      else if (fieldType === 'price') vp = '([\\d,]+)';
      else if (fieldType === 'receiver') {
        if (beforeValue.includes('\t')) return escaped.replace(/\\t/g,'\\t') + '([^\\t\\n]+)';
        vp = '([가-힣]{2,5})';
      }
      else if (fieldType === 'address') vp = '([가-힣0-9\\s\\-\\(\\)]+?)(?=\\s*\\n|$)';
      return escaped + '\\s*' + vp;
    };

    const extractFixedTexts = (text) => {
      const cleaned = text
        .replace(/\d{3,}/g, '')
        .replace(/[가-힣]{1,2}(?=\s|$)/g, '')
        .replace(/https?:\/\/\S+/g, '')
        .replace(/[^\uAC00-\uD7A3a-zA-Z\s]/g, ' ')
        .replace(/\s+/g, ' ').trim();
      return [...new Set(cleaned.split(/\s+/).filter(w => w.length >= 2))];
    };

    const calcSimilarity = (arr1, arr2) => {
      if (!arr1.length || !arr2.length) return 0;
      const s1 = new Set(arr1), s2 = new Set(arr2);
      const inter = [...s1].filter(x => s2.has(x)).length;
      return inter / new Set([...s1, ...s2]).size;
    };

    const extractPriceCandidates = (text) => {
      const candidates = []; const seen = new Set();
      const patterns = [
        { re: /([가-힣a-zA-Z\s\(\)]{1,15})[:\t\s]+([\d,]{3,})\s*원/g, needWon: true },
        { re: /([가-힣a-zA-Z\s\(\)]{1,15})[:\t\s]+([\d,]{3,})(?!\d)/g, needWon: false },
        { re: /([가-힣]{2,10})([\d,]{4,})\s*원/g, needWon: true },
      ];
      for (const { re } of patterns) {
        let m;
        while ((m = re.exec(text)) !== null) {
          let label = m[1].replace(/[\n\t]/g, ' ').trim();
          const rawValue = m[2]; const value = rawValue.replace(/,/g, ''); const num = parseInt(value, 10);
          const lp = label.split(' ');
          if (lp.length > 2) label = lp.slice(-2).join(' ');
          const seenKey = label + ':' + value;
          const isUnit = /^(ml|l|kg|g|개|ea|mm|cm|m|호|P|p)$/i.test(label.trim());
          if (!isUnit && num >= 1000 && num <= 10000000 && !seen.has(seenKey)) {
            seen.add(seenKey); candidates.push({ label, value, rawValue });
          }
        }
      }
      return candidates;
    };

    const extractReceiverCandidates = (text) => {
      const candidates = []; const seen = new Set();
      const pattern = /([가-힣a-zA-Z\s]{1,12})[:\t\s]+([가-힣]{2,5})(?=[\s\t\n\(]|$)/g;
      let m;
      while ((m = pattern.exec(text)) !== null) {
        const label = m[1].replace(/[\n\t]/g, ' ').trim();
        const value = m[2].trim();
        if (!seen.has(value) && label.length >= 2) { seen.add(value); candidates.push({ label, value }); }
      }
      return candidates;
    };

    const extractOrderNumberCandidates = (text) => {
      const candidates = []; const seen = new Set();
      const pattern = /([가-힣a-zA-Z\s]{1,12})[:\t\s]+([\d-]{8,})/g;
      let m;
      while ((m = pattern.exec(text)) !== null) {
        const label = m[1].replace(/[\n\t]/g, ' ').trim();
        const value = m[2].trim();
        if (!seen.has(value) && label.length >= 2) { seen.add(value); candidates.push({ label, value }); }
      }
      return candidates;
    };

    // ═══════════════════════════════════════════════════════════

    // ── 주소 유사도 판단 (단일 진입점) ──────────────────────
    // parsedAddr: 주문서에서 추출한 주소
    // presetAddr: 프리셋에 저장된 주소
    // → 토큰 매칭 60% 이상이면 프리셋 사용 (더 깔끔하고 신뢰도 높음)
    // → 미달이면 주문서 주소 사용
    // → parsedAddr 없으면 프리셋 그대로
    const resolveAddress = (parsedAddr, presetAddr) => {
      // 추출 실패 → 프리셋 자동 대입 (표시는 UI에서 처리)
      if (!parsedAddr) return { addr: presetAddr || '', fromPreset: !!presetAddr };
      if (!presetAddr) return { addr: parsedAddr, fromPreset: false };
      const tokenize = s => s.replace(/[()（）,·\d]/g, ' ').split(/\s+/).filter(t => t.length > 1);
      const pt = tokenize(parsedAddr);
      const ft = tokenize(presetAddr);
      const matched = pt.filter(t => ft.some(f => f.includes(t) || t.includes(f))).length;
      const score = matched / Math.max(pt.length, 1);
      // 60% 이상 유사 → 프리셋(더 깔끔), 미달 → 주문서 주소
      return score >= 0.6
        ? { addr: presetAddr, fromPreset: true }
        : { addr: parsedAddr, fromPreset: false };
    };

    // 범용 파싱 함수
    const parseOrderText = (text, SITE_DATA, PRESETS) => {
      const result = { site: '', orderNumber: '', cartNumber: '', price: '', receiver: '', phone: '', address: '', detected: false, matchType: '' };

      // ══════════════════════════════════════════════════════
      // 사이트 감지 — 4단계 순차 적용, 앞 단계에서 확정되면 stop
      // ══════════════════════════════════════════════════════

      const tryReScore = (pat, txt, flags) => {
        if (!pat) return false;
        try { const m = txt.match(new RegExp(pat, flags||'i')); return !!(m && (m[1]!==undefined?m[1]:m[0])); }
        catch(e) { return false; }
      };

      // ── Step 1: URL 도메인 감지 (즉시 확정) ──────────────
      // 주문서 텍스트에 사이트 도메인이 포함되어 있으면 즉시 확정
      const DOMAIN_MAP = {
        'temu.com': '테무', 'wemakeprice.com': '위메프', 'coupang.com': '쿠팡',
        'shopping.naver.com': '네이버', 'smartstore.naver.com': '네이버',
        'oliveyoung.co.kr': '올리브영', 'gmarket.co.kr': '지마켓',
        'auction.co.kr': '옥션', '11st.co.kr': '11번가',
        'interpark.com': '인터파크', 'kakao.com': '카카오',
        'lotteon.com': '롯데온', 'ssg.com': 'SSG',
      };
      for (const [domain, siteName] of Object.entries(DOMAIN_MAP)) {
        if (text.includes(domain) && SITE_DATA[siteName]) {
          result.site = siteName; result.matchType = 'domain'; break;
        }
      }

      // ── Step 2: 주문번호 패턴 단독 매칭 (고유 포맷 = 즉시 확정) ──
      // 주문번호 패턴이 맞으면 사이트 확정 (포맷이 사이트마다 고유)
      if (!result.site) {
        for (const [site, data] of Object.entries(SITE_DATA)) {
          if (data.orderNumber && tryReScore(data.orderNumber, text)) {
            result.site = site; result.matchType = 'orderNumber'; break;
          }
        }
      }

      // ── Step 3: 다중 패턴 매칭 점수 (2개 이상 패턴 일치) ──
      if (!result.site) {
        let bestSite = '', bestScore = -1;
        Object.entries(SITE_DATA).forEach(([site, data]) => {
          let score = 0;
          if (tryReScore(data.orderNumber, text))      score += 4;
          if (tryReScore(data.price, text))            score += 3;
          if (tryReScore(data.receiver, text, 'im'))  score += 3;
          if (tryReScore(data.phone, text))            score += 2;
          if (tryReScore(data.address, text))          score += 1;
          // fixedTexts 중 3개 이상 포함되면 추가 점수
          const ftMatches = (data.fixedTexts||[]).filter(ft => text.includes(ft)).length;
          if (ftMatches >= 3) score += ftMatches;
          if (score > bestScore) { bestScore = score; bestSite = site; }
        });
        if (bestScore >= 4) { result.site = bestSite; result.matchType = 'pattern'; }
      }

      // ── Step 4: fixedTexts Jaccard 유사도 (최후 보조) ──
      if (!result.site) {
        const inputFixed = extractFixedTexts(text);
        let fixedBest = '', fixedScore = 0;
        Object.entries(SITE_DATA).forEach(([site, data]) => {
          if (data.fixedTexts && data.fixedTexts.length > 0) {
            const score = calcSimilarity(inputFixed, data.fixedTexts);
            if (score > fixedScore) { fixedScore = score; fixedBest = site; }
          }
        });
        if (fixedScore >= 0.15) { result.site = fixedBest; result.matchType = 'fixed'; }
      }

      // 시트 패턴으로 파싱
      if (result.site && SITE_DATA[result.site]) {
        const p = SITE_DATA[result.site];
      // 캡처 그룹 여러 개일 때 필드 타입에 맞게 조합 (+82→010 포함)
        const resolveMatch = (m, fieldType) => {
          if (!m) return '';
          const groups = [];
          for (let i = 1; i < m.length; i++) { if (m[i] !== undefined) groups.push(m[i]); }
          if (groups.length === 0) return (m[0] || '').trim();
          if (fieldType !== 'phone') return groups[0].trim();
          let digits = groups.join('').replace(/[^\d]/g, '');
          if (digits.startsWith('0082')) digits = digits.slice(4);
          else if (digits.startsWith('82')) digits = digits.slice(2);
          const normalized = digits.startsWith('0') ? digits : '0' + digits;
          if (normalized.length === 11) return normalized.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
          if (normalized.length === 10) return normalized.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
          return normalized;
        };
        const tryRe = (pat, flags, fieldType) => {
          try { const m = text.match(new RegExp(pat, flags)); return resolveMatch(m, fieldType || 'generic'); }
          catch(e) { return ''; }
        };
        if (p.orderNumber) result.orderNumber = tryRe(p.orderNumber, 'i', 'orderNumber');
        if (p.price) { const v = tryRe(p.price, 'i', 'price'); if (v) result.price = v.replace(/,/g,''); }
        if (p.receiver) result.receiver = tryRe(p.receiver, 'im', 'receiver');
        if (p.phone) result.phone = tryRe(p.phone, 'i', 'phone');
        if (!result.phone) { const pm = text.match(/(010[\s\-]?[\d\*]{4}[\s\-]?[\d\*]{4})/); if (pm) result.phone = pm[1]; }
        if (p.address) result.address = tryRe(p.address, 'i');
        if (p.cartNumber) result.cartNumber = tryRe(p.cartNumber, 'i', 'cartNumber');
        // 장바구니번호 — 사이트 무관, 텍스트에 "장바구니" 키워드 있을 때만 추출
        if (text.includes('장바구니')) {
          const cartM = text.match(/장바구니\s*번호[\s:：]*(\d{8,})/i) || text.match(/장바구니[\s:：]*(\d{8,})/i);
          if (cartM) result.cartNumber = cartM[1];
        }
        result.detected = !!(result.orderNumber || result.price);
        result.matchType = 'known';
        if (result.orderNumber && result.price) return result;
        if (!result.phone) { const pm = text.match(/(010[\s\-]?[\d\*]{4}[\s\-]?[\d\*]{4})/); if (pm) result.phone = pm[1]; }
        return result;
      }

      // 장바구니번호 fallback — 패턴 없을 때도 키워드 있으면 추출
      if (text.includes('장바구니') && !result.cartNumber) {
        const cartM = text.match(/장바구니\s*번호[\s:：]*(\d{8,})/i) || text.match(/장바구니[\s:：]*(\d{8,})/i);
        if (cartM) result.cartNumber = cartM[1];
      }

      // 주문번호 fallback
      if (!result.orderNumber) {
        for (const re of [
          /주문번호[\s:：]*([A-Za-z0-9\-]{6,})/i,
          /주문\s*번호[:\s]*([A-Za-z0-9\-]{6,})/i,
          /order[:\s]*(?:no|number)[:\s]*([A-Za-z0-9\-]{6,})/i,
          /번호[:\s]*(\d{10,})/i,
          /(\d{14,20})/
        ]) { const m = text.match(re); if (m && m[1]) { result.orderNumber = m[1]; break; } }
      }

      // 금액 fallback
      if (!result.price) {
        for (const re of [
          /총\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3}){1,})\s*원/i,
          /결제금액\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /합계\s*₩\s*([\d,]+)/i, /₩\s*([\d,]+)/,
          /(?:카드\s*간편결제|신용카드|체크카드)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /(?:카드\s*간편결제|신용카드|체크카드)[^\d]*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /(?:계좌이체|무통장입금)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /상품금액\s*\n?\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /총\s*결제금액\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /총\s*결제\s*금액\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
          /최종\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i,
          /결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i,
          /(\d{1,3}(?:,\d{3,}))\s*원/
        ]) { const m = text.match(re); if (m && m[1]) { result.price = m[1].replace(/,/g,''); break; } }
      }

      // 수취인 fallback
      if (!result.receiver) {
        for (const re of [
          /받는사람\t([^\t\n]+)/i,
          /받는사람\s{2,}([^\s\n][^\n]*)/i,
          /받는\s*사람[:\s]+([가-힣]{2,5})/i,
          /수취인[:\s]+([가-힣]{2,5})/i,
          /수령자[:\s]+([가-힣]{2,5})/i,
          /받으시는\s*분[:\s]+([가-힣]{2,5})/i,
          /배송지명([가-힣]{2,5})\(/i,
          /([가-힣]{2,5})\+?82/,
          /([가-힣]{2,5})\s+0\d{1,2}\s\d{3,4}\s\d{4}/,
          /배송지\s*\n([가-힣]{2,5})/,
        ]) { const m = text.match(re); if (m && m[1]) { result.receiver = m[1].trim(); break; } }
        if (!result.receiver) {
          for (const name of Object.keys(PRESETS)) {
            if (text.includes(name)) { result.receiver = name; break; }
          }
        }
      }

      // 전화번호 fallback
      if (!result.phone) {
        for (const re of [
          /연락처(010[-\s]?[\d\*]{3,4}[-\s]?[\d\*]{4})/i,
          /연락처\s*(010[-\s]?[\d\*]{4}[-\s]?[\d\*]{4})/i,
          /(010[-\s]?[\d\*]{4}[-\s]?[\d\*]{4})/
        ]) { const m = text.match(re); if (m) { result.phone = m[1].replace(/\s/g,'').replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3'); break; } }
      }

      // 주소 fallback — 패턴 없는 사이트용 일반 패턴들
      if (!result.address) {
        // 기존 패턴들
        for (const re of [
          /받는주소\s*\((\d{5})\)\s*([^\n]+)/i,
          /주소([가-힣0-9\s\-\(\)]+?)\s*\((\d{5})\)/i,
          /\((\d{5})\)\s*([^\n]+)/,
          /\[(\d{5})\]\s*([^\n]+)/,
          /주소[:\s]*\(?\d{5}\)?\s*([^\n]+)/i,
          /받는\s*주소[:\s]*([^\n]+)/i
        ]) {
          const m = text.match(re);
          if (m) {
            let addr = (m[1] && m[1].match(/[가-힣]/)) ? m[1] : (m[2] || m[m.length-1]);
            addr = addr.trim().split('\t')[0].trim().replace(/\(\d{5}\).*$/g,'').replace(/\s*단독\s*$/g,'').trim();
            if (addr && addr.match(/[가-힣]/)) { result.address = addr; break; }
          }
        }
      }

      result.detected = !!(result.orderNumber || result.price);
      return result;
    };

            const { order, index } = item;
            const d = new Date(commonSettings.transactionDate);
            
            // ─────────────────────────────────────────────────────────
            // [추가된 로직] 프리셋과 현재 폼(editableData)의 차이점 추출
            // ─────────────────────────────────────────────────────────
            const preset = PRESETS[order.person] || {};
            const currentData = editableData[index] || {};
            const overrides = {};

            // 1. 수취인 비교
            if (currentData.receiver && currentData.receiver !== preset.name) {
              overrides.receiver = currentData.receiver;
            }
            // 2. 전화번호 비교 (숫자만 추출해서 순수하게 비교)
            const curPhone = (currentData.phone || '').replace(/[^\d]/g, '');
            const prePhone = (preset.phone || '').replace(/[^\d]/g, '');
            if (curPhone && curPhone !== prePhone) overrides.phone = currentData.phone;
            // 3. 주소 비교
            if (currentData.address && currentData.address !== preset.address) overrides.address = currentData.address;
            // 4. 계좌 정보 비교
            if (currentData.bank && currentData.bank !== preset.bank) overrides.bank = currentData.bank;
            if (currentData.account && currentData.account !== preset.account) overrides.account = currentData.account;
            if (currentData.accountHolder && currentData.accountHolder !== preset.accountHolder) overrides.accountHolder = currentData.accountHolder;

            // 차이점이 있으면 JSON 문자열로 변환, 없으면 빈 문자열
            const overridesStr = Object.keys(overrides).length > 0 ? JSON.stringify(overrides) : '';
            // ─────────────────────────────────────────────────────────

            return {
              date: `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}`,
              site: order.site === '직접입력' ? (order.customSite||'직접입력') : order.site,
              talkRoom: order.talkRoomName || commonSettings.talkRoomName,
              id: order.personId === '직접입력' ? (order.customId||'직접입력') : order.personId,
              price: order.price,
              card: order.card || CARDS[0] || '',
              delivery: order.deliveryType || DELIVERY_TYPES[0] || '',
              review: order.reviewMethod || REVIEW_METHODS[0] || '',
              reviewFee: order.reviewFee === '직접입력' ? (order.customFee||'직접입력') : (order.reviewFee||REVIEW_FEES[0]||''),
              guideline: order.guideline, 
              cartNumber: order.cartNumber||'', 
              orderNumber: order.orderNumber, 
              productUrl: order.productUrl||'',

            };
        });

        if (sheetsData.length === 0) { alert('⚠️ 저장할 주문이 없습니다.'); return; }
        try {
          let existingNums = new Set();
          try {
            const cbName = 'cb_check_' + Date.now();
            const recent = await new Promise((res, rej) => {
              const t = setTimeout(() => { delete window[cbName]; rej(); }, 5000);
              window[cbName] = (d) => { clearTimeout(t); delete window[cbName]; res(d); };
              const s = document.createElement('script');
              s.src = url + '?action=getRecentOrderNumbers&callback=' + cbName;
              s.onerror = () => { clearTimeout(t); rej(); };
              document.body.appendChild(s);
            });
            if (recent.success) recent.orderNumbers.forEach(n => existingNums.add(n));
          } catch(e) {}
          
          const filtered = sheetsData.filter(o => !o.orderNumber || !existingNums.has(o.orderNumber.toString().trim()));
          if (filtered.length === 0) { alert('⚠️ 모두 중복된 주문번호입니다.'); return; }
          const skipped = sheetsData.length - filtered.length;
          
          await fetch(url, { method:'POST', body:JSON.stringify({ orders: filtered }), mode:'no-cors' });
          alert(`✅ ${filtered.length}개 주문이 구글 시트에 저장되었습니다!` + (skipped > 0 ? `\n(중복 ${skipped}개 제외)` : ''));
        } catch(e) { alert('❌ 저장 중 오류가 발생했습니다.\n\n' + e.message); }
      };

      useEffect(() => {
        setLoading(false);
        loadConfigFromSheet();
        loadSharedConfig();
      }, []);

      useEffect(() => {
        const newED = {};
        orders.forEach((order, oi) => {
          const preset = PRESETS[order.person] || {};
          const site = order.site === '직접입력' ? (order.customSite||'') : order.site;
          const personId = order.personId === '직접입력' ? (order.customId||'') : order.personId;
          const reviewFee = order.reviewFee === '직접입력' ? (order.customFee||'') : order.reviewFee;
          const resolvePhone = (parsedPhone) => {
            if (parsedPhone && preset.phone) {
              const p = parsedPhone.replace(/[^\d]/g,''); const f = preset.phone.replace(/[^\d]/g,'');
              if (p===f || f.includes(p) || p.includes(f)) return preset.phone;
            }
            return parsedPhone || preset.phone || '';
          };
          const resolveAddr = (parsedAddr) => resolveAddress(parsedAddr, preset.address).addr;
          newED[oi] = {
            name: order.parsedReceiver||preset.name||'', receiver: order.parsedReceiver||preset.name||'',
            phone: resolvePhone(order.parsedPhone), phoneNoHyphen: resolvePhone(order.parsedPhone).replace(/-/g,''),
            address: resolveAddr(order.parsedAddress),
            orderNumber: order.orderNumber, personId, price: order.price, site,
            naverId: preset.naverId||'', nickname: preset.nickname||'', bank: preset.bank||'',
            account: preset.account||'', accountWithHyphen: preset.accountWithHyphen||'', accountHolder: preset.accountHolder||'',
            card: order.card, deliveryType: order.deliveryType, reviewMethod: order.reviewMethod, reviewFee
          };
        });
        setEditableData(newED);
      }, [orders, formTemplate]);

      const addOrder = () => {

        setOrders([...orders, { id:Date.now(), rawText:'', site:t.site||'', orderNumber:'', cartNumber:'', price:'', person:'', personId:'', card:t.card||'', deliveryType:t.deliveryType||'', reviewMethod:t.reviewMethod||'', reviewFee:t.reviewFee||'', guideline:'', talkRoomName:t.talkRoomName||'', productUrl:'', parsed:false }]);
      };
      const removeOrder = (id) => { if (orders.length > 1) setOrders(orders.filter(o => o.id !== id)); };
      const updateOrder = (index, field, value) => {
        const n = [...orders]; n[index][field] = value;

            phone:resolvePhone(parsed.phone), phoneNoHyphen:resolvePhone(parsed.phone).replace(/-/g,''),
            address:resolveAddr(parsed.address),

            personId:defaultId, price:parsed.price||newOrders[index].price, site:detectedSite,
            naverId:preset.naverId||'', nickname:preset.nickname||'', bank:preset.bank||'',
            account:preset.account||'', accountWithHyphen:preset.accountWithHyphen||'', accountHolder:preset.accountHolder||''
          }

        // 사이트 인식됐고 SITE_DATA에 패턴 있으면 학습 UI 안 띄움

          setLearningData({

            orderNumberLabelBefore:_onL.before, orderNumberLabelAfter:_onL.after,

            receiverCandidates: (!hasPattern && _rvL.candidates.filter(c=>c.labelBefore||c.labelAfter).length>1) ? _rvL.candidates.filter(c=>c.labelBefore||c.labelAfter) : [],
            receiver:_rv, receiverLabelBefore:_rvL.before, receiverLabelAfter:_rvL.after,
            phone:_ph2, phoneLabelBefore:_phL2.before, phoneLabelAfter:_phL2.after,
            address:_ad2, addressLabelBefore:_adL2.before, addressLabelAfter:'', // 주소 뒤 앵커 비움
            orderIndex:index
          });
          setShowLearningUI(true);
        }
      };

      const handleLearnOrder = (index, text) => {
        if (!text) return;
        const parsed = parseOrderText(text, SITE_DATA, PRESETS);
        const cur = orders[index];
        const _on = cur.orderNumber||parsed.orderNumber||'';
        const _rv = cur.parsedReceiver||parsed.receiver||'';
        const _ph = cur.parsedPhone||parsed.phone||'';
        const _ad = cur.parsedAddress||parsed.address||'';
        const _onL = extractLabels(text, _on); const _rvL = extractLabels(text, _rv);
        const _phL = extractLabels(text, _ph); const _adL = extractLabels(text, _ad);
        setLearningData({
          site:cur.site||parsed.site||'', siteIsCustom:false, rawText:text, orderNumber:_on,
          orderNumberLabelBefore:_onL.before, orderNumberLabelAfter:_onL.after,
          price:cur.price||parsed.price||'', priceCandidates:extractPriceCandidates(text), orderNumberCandidates:extractOrderNumberCandidates(text),
          receiverCandidates:[],  // 수동 수정 시 패턴 이미 있으므로 candidates 경고 안 띄움
          receiver:_rv, receiverLabelBefore:_rvL.before, receiverLabelAfter:_rvL.after,
          phone:_ph, phoneLabelBefore:_phL.before, phoneLabelAfter:_phL.after,
          address:_ad, addressLabelBefore:_adL.before, addressLabelAfter:'', // 주소 뒤 앵커 비움
          priceRawValue:'', orderIndex:index
        });
        setShowLearningUI(true);
      };

      const applyCommonSettings = () => {
        setOrders(orders.map(order => {
          const u = { ...order, deliveryType:commonSettings.deliveryType, reviewMethod:commonSettings.reviewMethod, reviewFee:commonSettings.reviewFee, guideline:commonSettings.guideline };
          if (commonSettings.person) { u.person = commonSettings.person; u.personId = PRESETS[commonSettings.person]?.coupangId||''; }
          if (commonSettings.reviewFee === '직접입력' && commonSettings.customReviewFee) u.customFee = commonSettings.customReviewFee;
          return u;
        }));
        alert('✅ 공통 설정이 모든 주문에 적용되었습니다!');
      };

      const resetAllOrders = () => {
        if (!confirm('🗑️ 모든 주문을 삭제하고 초기화하시겠습니까?')) return;
        setOrders([{ id:Date.now(), rawText:'', site:'', orderNumber:'', cartNumber:'', price:'', person:Object.keys(PRESETS)[0]||'', personId:'', card:CARDS[0]||'', deliveryType:DELIVERY_TYPES[0]||'', reviewMethod:REVIEW_METHODS[0]||'', reviewFee:'1000', guideline:'', talkRoomName:'', productUrl:'', parsed:false }]);
        setCommonSettings({ talkRoomName:'', transactionDate:new Date().toISOString().split('T')[0], deliveryType:DELIVERY_TYPES[0]||'', reviewMethod:REVIEW_METHODS[0]||'', reviewFee:'1000', guideline:'' });
        setFormTemplate(''); setEditableData({}); setSelectedOrders([]);
      };

      const parseFormTemplate = (template) => {
        const fields = [];
        template.split('\n').filter(l=>l.trim()).forEach(line => {
          if (line.includes('/')) { fields.push(...line.split('/').map(p=>p.trim().replace(/[:\：=＝\s]+$/,'')).filter(p=>p)); }
          else { const m = line.match(/^([^:：=＝/]+)[:\：=＝\s]*$/); if (m) fields.push(m[1].trim()); }
        });
        return fields;
      };

      const mapFieldToKey = (fieldName) => {
        if (learnedMappings[fieldName]) return learnedMappings[fieldName];
        if (sharedLabelMap && sharedLabelMap[fieldName]) return sharedLabelMap[fieldName];
        return fieldName;
      };

      const generateOutputText = () => {
        if (!formTemplate.trim()) { alert('⚠️ 폼 양식을 입력해주세요'); return ''; }
        if (selectedOrders.length === 0) { alert('⚠️ 출력할 주문을 선택해주세요'); return ''; }
        return selectedOrders.map(oi => {
          const data = editableData[oi];
          if (!data) return '';
          return formTemplate.split('\n').filter(l=>l.trim()).map(line => {
            if (line.includes('/')) {
              const sep = line.match(/\s*\/\s*/)?.[0] || '/';
              return line.split('/').map(part => {
                const key = mapFieldToKey(part.trim());
                let val = data[key]||'';
                if (key === 'account') val = val.toString().replace(/-/g,'');
                return val;
              }).join(sep);
            } else {
              const m = line.match(/^([^=:：]+)[=:：]?\s*$/);
              const outputSep = line.includes('=') ? ' = ' : ': ';
              if (m) {
                const fieldName = m[1].trim(); const key = mapFieldToKey(fieldName);
                let value = '';
                if (key === '__BANK_ACCOUNT_HOLDER__') value = `${data.bank||''} ${data.accountWithHyphen||data.account||''} ${data.accountHolder||''}`.trim();
                else if ((key==='account'||key==='accountWithHyphen') && accountFullFormat[fieldName]) {
                  const av = key==='account' ? (data.account||data.accountWithHyphen||'').replace(/-/g,'') : (data.accountWithHyphen||data.account||'');
                  value = `${data.bank||''} ${av} ${data.accountHolder||''}`.trim();
                } else {

                  if (key === 'account') value = value.toString().replace(/-/g,'');

        }).filter(Boolean).join('\n\n---\n\n');

      const S = {
        inp: (extra) => ({ width:'100%', padding:'0.5rem', border:'1px solid #cbd5e1', borderRadius:'6px', fontSize:'0.9rem', boxSizing:'border-box', ...extra }),
        sel: (extra) => ({ width:'100%', padding:'0.5rem', border:'1px solid #cbd5e1', borderRadius:'6px', fontSize:'0.9rem', ...extra }),

        sec: { background:'#f8fafc', border:'2px solid #e2e8f0', borderRadius:'12px', padding:'1.5rem', marginBottom:'1.5rem' },

        React.createElement('div', { style:{background:'white',padding:'3rem',borderRadius:'16px',textAlign:'center'} },
          React.createElement('div', { style:{fontSize:'3rem',marginBottom:'1rem'} }, '📦'),
          React.createElement('h2', { style:{margin:'0 0 0.5rem'} }, '설정 로딩 중...'),
          React.createElement('p', { style:{margin:0,color:'#64748b'} }, 'review-setting 시트에서 정보를 가져오고 있습니다.')
        )

        React.createElement('div', { style:{maxWidth:'1400px',margin:'0 auto',background:'rgba(255,255,255,0.95)',borderRadius:'24px',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',overflow:'hidden'} },
          React.createElement('div', { style:{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'2rem',color:'white'} },
            React.createElement('h1', { style:{margin:0,fontSize:'2rem',fontWeight:'700',letterSpacing:'-0.5px'} }, '📦 주문 관리 시스템'),
            React.createElement('p', { style:{margin:'0.5rem 0 0',opacity:0.9,fontSize:'0.95rem'} }, '모든 쇼핑몰 지원 | 자동 파싱 + 수동 수정'),
