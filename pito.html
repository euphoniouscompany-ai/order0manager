    const OrderManager = () => {
      // 동적 설정 (review-setting 시트에서 로드)
      const [PRESETS, setPRESETS] = useState(DEFAULT_PRESETS);
      const [SITES, setSITES] = useState(DEFAULT_SITES);

      // 로딩 상태
      const [loading, setLoading] = useState(true);
      const [configError, setConfigError] = useState('');

      // review-setting 시트에서 설정 로드
      useEffect(() => {
        // 기본값으로 바로 시작 (Apps Script 로딩 스킵)

        // 백그라운드에서 로드 시도 (실패해도 무시)

      const loadConfigFromSheet = async () => {
        // 일단 기본값으로 바로 시작
        setLoading(false);
        
        // 백그라운드에서 시트 로딩 시도
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwiJTCenXmOvhpGwpf62SpHHtrzgJJMpR7LPH3Bff19p2AU1it-abgQBrNs-OalDVAU/exec';
        
        if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
          setConfigError('⚠️ Apps Script URL을 설정해주세요');
          return;
        }

        try {
          // JSONP 방식으로 CORS 우회
          const callbackName = 'jsonpCallback_' + Date.now();
          
          await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
              reject(new Error('Timeout'));
            }, 3000);
            
            window[callbackName] = (data) => {
              clearTimeout(timeout);
              delete window[callbackName];
              
              if (data.success && data.config) {
                const config = data.config;
                
                // 사람 정보 변환 (nameIdMappings 기반)
                if (config.people && config.people.length > 0) {
                  const newPresets = {};
                  config.people.forEach(person => {
                    const siteIds = config.nameIdMappings[person.name] || {};
                    newPresets[person.name] = {
                      name: person.name,
                      reviewName: person.name.charAt(0) + '*' + person.name.charAt(person.name.length - 1),
                      phone: person.phone,
                      address: person.address,
                      coupangId: siteIds['쿠팡'] || person.coupangId || '',
                      naverId: siteIds['네이버'] || person.naverId || '',
                      bank: "신한은행",
                      account: "110254150254",
                      accountWithHyphen: "110254-150254",
                      accountHolder: "이해운"  // 예금주 고정
                    };
                  });
                  setPRESETS(newPresets);
                  console.log('✅ 프리셋 로드됨:', newPresets);
                }
                
                if (config.sites && config.sites.length > 0) setSITES(config.sites);
                if (config.siteIds) {
                  setSITE_IDS(config.siteIds);
                  console.log('✅ 사이트별 아이디 로드됨:', config.siteIds);
                }
                if (config.nameIdMappings) {
                  setNAME_ID_MAPPINGS(config.nameIdMappings);
                  console.log('✅ 이름-아이디 매핑 로드됨:', config.nameIdMappings);
                }
                if (config.cards && config.cards.length > 0) setCARDS(config.cards);
                if (config.deliveryTypes && config.deliveryTypes.length > 0) setDELIVERY_TYPES(config.deliveryTypes);
                if (config.reviewMethods && config.reviewMethods.length > 0) setREVIEW_METHODS(config.reviewMethods);
                if (config.reviewFees && config.reviewFees.length > 0) {
                  const fees = config.reviewFees.map(String);
                  // "0"이 없으면 추가
                  if (!fees.includes('0')) {
                    fees.unshift('0');
                  }
                  setREVIEW_FEES(fees);
                }
                
                if (config.labelMappings && Object.keys(config.labelMappings).length > 0) {
                  setLearnedMappings(config.labelMappings);
                  console.log('✅ 라벨 학습 데이터 로드됨:', config.labelMappings);
                }
                
                setConfigError(''); // 에러 메시지 제거
                resolve();
              } else {
                reject(new Error(data.error || '설정을 불러올 수 없습니다'));

            };
            
            const script = document.createElement('script');
            script.src = APPS_SCRIPT_URL + '?action=getConfig&callback=' + callbackName;
            script.onerror = () => {
              clearTimeout(timeout);
              reject(new Error('Script load failed'));

            document.body.appendChild(script);
            
            setTimeout(() => {

        } catch (error) {

    // 범용 파싱 함수
    const parseOrderText = (text) => {
      const result = {
        site: '',
        orderNumber: '',
        price: '',
        receiver: '',
        phone: '',
        address: '',
        detected: false
      };

      // 사이트 감지 (다양한 키워드)
      const siteKeywords = {
        "쿠팡": ["쿠팡", "coupang"],
        "네이버": ["네이버페이", "네이버파이낸셜", "네이버"],
        "옥션": ["옥션", "auction", "eBay"],
        "지마켓": ["지마켓", "G마켓", "gmarket"],
        "11번가": ["11번가", "11st"],
        "SSG": ["SSG", "신세계"],
        "무신사": ["무신사", "musinsa"],
        "쿠팡": ["MY쿠팡", "마이쿠팡"]
      };

      for (const [site, keywords] of Object.entries(siteKeywords)) {
        if (keywords.some(kw => text.includes(kw))) {
          result.site = site;
          break;
        }
      }

      // 주문번호 추출 (다양한 패턴)
      const orderPatterns = [
        /주문번호\s*(\d{10,})/i,              // 쿠팡: "주문번호 21100171701760"
        /주문\s*번호[:\s]*(\d{10,})/i,
        /order[:\s]*(?:no|number)[:\s]*(\d{10,})/i,
        /번호[:\s]*(\d{10,})/i,
        /(\d{14,20})/                         // 14-20자리 숫자 (쿠팡 주문번호)
      ];

      for (const pattern of orderPatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.orderNumber = match[1];
          break;
        }
      }

      // 금액 추출
      const pricePatterns = [
        // 네이버페이 우선: 카드 간편결제 / 신용카드 뒤의 금액
        /(?:카드\s*간편결제|신용카드|체크카드)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /(?:카드\s*간편결제|신용카드|체크카드)[^\d]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 계좌이체
        /(?:계좌이체|무통장입금)\s*\n\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 네이버페이: 주문금액 섹션
        /주문금액[^\d]*총\s*(\d{1,3}(?:,\d{3})*)\s*원/i,
        
        // 일반 패턴
        /총\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)\s*원/i,
        /최종\s*결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /total[:\s]*(\d{1,3}(?:,\d{3})*)/i,
        /결제\s*금액[:\s]*(\d{1,3}(?:,\d{3})*)/i
      ];

      for (const pattern of pricePatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.price = match[1].replace(/,/g, '');
          break;
        }
      }

      // 수취인 추출
      const receiverPatterns = [
        /받는사람\t([^\t\n]+)/i,              // 쿠팡: "받는사람\t정동신\t" (탭 구분)
        /받는사람\s{2,}([^\s\n][^\n]*)/i,    // 쿠팡: "받는사람   정동신"
        /받는\s*사람[:\s]+([가-힣]{2,5})/i,  // "받는 사람: 이해운" (한글 이름만)
        /수취인[:\s]+([가-힣]{2,5})/i,
        /수령자[:\s]+([가-힣]{2,5})/i,
        /받으시는\s*분[:\s]+([가-힣]{2,5})/i,
        /배송지명[^\(]*\(([^\)]+)\)/i
      ];

      for (const pattern of receiverPatterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          result.receiver = match[1].trim();
          break;
        }
      }

      // 전화번호 추출
      const phonePatterns = [
        /연락처\s*(010[-\s]?\d{4}[-\s]?\d{4})/i,  // 쿠팡: "연락처	010-9083-9985"
        /(010[-\s]?\d{4}[-\s]?\d{4})/
      ];
      for (const pattern of phonePatterns) {
        const phoneMatch = text.match(pattern);
        if (phoneMatch) {
          result.phone = phoneMatch[1].replace(/\s/g, '').replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
          break;
        }
      }

      // 주소 추출
      const addressPatterns = [
        /받는주소\s*\((\d{5})\)\s*([^\n]+)/i,     // 쿠팡: "받는주소	(10248) 경기도..."
        /\((\d{5})\)\s*([^\n]+)/,
        /\[(\d{5})\]\s*([^\n]+)/,
        /주소[:\s]*\(?\d{5}\)?\s*([^\n]+)/i,
        /받는\s*주소[:\s]*([^\n]+)/i
      ];

      for (const pattern of addressPatterns) {
        const match = text.match(pattern);
        if (match) {
          // 주소에서 우편번호, 배송요청사항 등 제거
          let addr = match[match.length - 1].trim();
          // 탭 문자 이후 내용 제거 (쿠팡 배송요청사항)
          addr = addr.split('\t')[0].trim();
          // 괄호 안 아파트명 등은 유지, 그 이후 불필요한 내용 제거
          result.address = addr;
          break;
        }
      }

      result.detected = !!(result.orderNumber || result.price);
      
      return result;
    };

      const [orders, setOrders] = useState([
        { 
          id: Date.now(), 
          rawText: '',
          site: '',
          orderNumber: '',
          price: '',
          person: Object.keys(PRESETS)[0],
          personId: PRESETS[Object.keys(PRESETS)[0]].coupangId,
          card: CARDS[0],
          deliveryType: '실배',
          reviewMethod: '포토',
          reviewFee: '1000',
          guideline: '',
          productUrl: '',
          parsed: false
        }
      ]);

      const [commonSettings, setCommonSettings] = useState({
        talkRoomName: '',
        transactionDate: new Date().toISOString().split('T')[0], // 오늘 날짜 (YYYY-MM-DD)
        deliveryType: '실배',
        reviewMethod: '포토',
        reviewFee: '1000',
        guideline: ''
      });

      const addOrder = () => {
        setOrders([...orders, {
          id: Date.now(),
          rawText: '',
          site: '',
          orderNumber: '',
          price: '',
          person: Object.keys(PRESETS)[orders.length % 6],
          personId: PRESETS[Object.keys(PRESETS)[orders.length % 6]].coupangId,
          card: CARDS[0],
          deliveryType: '실배',
          reviewMethod: '포토',
          reviewFee: '1000',
          guideline: '',
          productUrl: '',
          parsed: false
        }]);
      };

      const removeOrder = (id) => {
        if (orders.length > 1) {
          setOrders(orders.filter(o => o.id !== id));
        }
      };

      const handlePaste = (index, text) => {
        const parsed = parseOrderText(text);
        const newOrders = [...orders];
        
        // 파싱된 이름으로 프리셋 자동 매칭
        let matchedPerson = newOrders[index].person;
        if (parsed.receiver) {
          // PRESETS에서 이름이 일치하는 사람 찾기
          const foundPerson = Object.keys(PRESETS).find(name => 
            name.includes(parsed.receiver) || parsed.receiver.includes(name)
          );
          if (foundPerson) {
            matchedPerson = foundPerson;
          }
        }
        
        // 사이트에 따른 아이디 자동 설정
        const detectedSite = parsed.site || newOrders[index].site;
        
        // 1순위: 이름-아이디 매핑에서 찾기 (이름 + 사이트 조합)
        let defaultId = '';
        if (matchedPerson && NAME_ID_MAPPINGS[matchedPerson] && detectedSite) {
          defaultId = NAME_ID_MAPPINGS[matchedPerson][detectedSite] || '';
        }
        // 2순위: 사이트별 아이디 첫 번째
        if (!defaultId) {
          const siteIdList = SITE_IDS[detectedSite] || [];
          defaultId = siteIdList.length > 0 ? siteIdList[0] : '';
        }
        // 3순위: 프리셋 쿠팡 아이디
        if (!defaultId) {
          defaultId = PRESETS[matchedPerson]?.coupangId || '';
        }

        newOrders[index] = {
          ...newOrders[index],
          rawText: text,
          site: detectedSite,
          orderNumber: parsed.orderNumber || newOrders[index].orderNumber,
          price: parsed.price || newOrders[index].price,
          person: matchedPerson,
          personId: defaultId,
          parsedReceiver: parsed.receiver,
          parsedPhone: parsed.phone,
          parsedAddress: parsed.address,
          parsed: parsed.detected
        };
        setOrders(newOrders);
      };

      const updateOrder = (index, field, value) => {
        const newOrders = [...orders];
        newOrders[index][field] = value;
        if (field === 'person') {
          const currentSite = newOrders[index].site;
          // 이름별 매핑 데이터에서 현재 사이트에 맞는 아이디 추출, 없으면 쿠팡아이디를 기본값으로
          newOrders[index].personId = (NAME_ID_MAPPINGS[value] && NAME_ID_MAPPINGS[value][currentSite]) 
            ? NAME_ID_MAPPINGS[value][currentSite] 
            : PRESETS[value].coupangId;
        }
        // 사이트를 변경했을 때도 아이디가 바뀌도록 추가
        if (field === 'site') {
          const currentPerson = newOrders[index].person;
          if (NAME_ID_MAPPINGS[currentPerson] && NAME_ID_MAPPINGS[currentPerson][value]) {
            newOrders[index].personId = NAME_ID_MAPPINGS[currentPerson][value];
          }
        }
        setOrders(newOrders);
      };

      const applyCommonSettings = () => {
        setOrders(orders.map(order => {
          const updatedOrder = {
            ...order,
            deliveryType: commonSettings.deliveryType,
            reviewMethod: commonSettings.reviewMethod,
            reviewFee: commonSettings.reviewFee,
            guideline: commonSettings.guideline
          };
          
          // 주문자 일괄 적용 (선택된 경우)
          if (commonSettings.person) {
            updatedOrder.person = commonSettings.person;
            updatedOrder.personId = PRESETS[commonSettings.person].coupangId;
          }
          
          // 립비 직접입력 값 적용
          if (commonSettings.reviewFee === '직접입력' && commonSettings.customReviewFee) {
            updatedOrder.customFee = commonSettings.customReviewFee;
          }
          
          return updatedOrder;
        }));

                  border: 'none',
                  padding: '0.75rem 1.5rem',
                  borderRadius: '8px',
                  fontSize: '0.95rem',
                  fontWeight: '600',
                  cursor: 'pointer'
                }
              }, '⚡ 공통설정 모든 주문에 적용')
            ),

            // 출력 설정 (새 버전)
            React.createElement('div', {
              style: {
                background: '#f8fafc',
                border: '2px solid #e2e8f0',
                borderRadius: '12px',
                padding: '1.5rem',
                marginBottom: '1.5rem'
              }
            },
              React.createElement('h2', {
                style: {
                  fontSize: '1.3rem',
                  fontWeight: '600',
                  marginBottom: '1rem',
                  color: '#2d3748'

              }, '📋 출력 설정'),

              // 1. 폼 양식 입력
              React.createElement('div', { style: { marginBottom: '1.5rem' } },
                React.createElement('label', {
                  style: {
                    display: 'block',
                    fontSize: '0.95rem',
                    fontWeight: '600',
                    color: '#475569',
                    marginBottom: '0.5rem'

                React.createElement('div', {
                  style: {
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    marginBottom: '0.5rem'
                  }
                },
                  React.createElement('div'),
                  Object.keys(learnedMappings).length > 0 && React.createElement('button', {
                    onClick: () => {
                      if (confirm(`학습된 ${Object.keys(learnedMappings).length}개 매핑을 모두 삭제하시겠습니까?`)) {
                        setLearnedMappings({});
                        localStorage.removeItem('learnedMappings');
                        alert('✅ 학습 데이터가 초기화되었습니다');
                      }
                    },
                    style: {
                      fontSize: '0.75rem',
                      padding: '0.25rem 0.5rem',
                      background: '#fef2f2',
                      border: '1px solid #fca5a5',
                      borderRadius: '4px',
                      color: '#991b1b',
                      cursor: 'pointer'
                    }
                  }, `📚 학습된 매핑 ${Object.keys(learnedMappings).length}개`)
                ),
                React.createElement('textarea', {
                  value: formTemplate,
                  onChange: (e) => setFormTemplate(e.target.value),
                  placeholder: `폼 양식을 붙여넣으세요:

예시 1 (라벨):
이름:
주문번호:
아이디:

예시 2 (슬래시):
이름 / 전화번호 / 주소`,
                  style: {
                    width: '100%',
                    minHeight: '120px',
                    padding: '0.75rem',
                    border: '1px solid #cbd5e1',
                    borderRadius: '8px',
                    fontSize: '0.9rem',
                    fontFamily: 'monospace',
                    resize: 'vertical'
                  }
                }),
                React.createElement('div', {
                  style: {
                    marginTop: '0.5rem',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '0.5rem'
                  }
                },
                  React.createElement('input', {
                    type: 'checkbox',
                    checked: removeLabels,
                    onChange: (e) => setRemoveLabels(e.target.checked),
                    style: { cursor: 'pointer' }
                  }),
                  React.createElement('label', {
                    style: {
                      fontSize: '0.9rem',
                      color: '#475569',
                      cursor: 'pointer'
                    },
                    onClick: () => setRemoveLabels(!removeLabels)
                  }, '라벨 제거 (값만 출력)')
                )
              ),

              // 2. 주문 선택
              React.createElement('div', { style: { marginBottom: '1.5rem' } },
                React.createElement('label', {
                  style: {
                    display: 'block',
                    fontSize: '0.95rem',
                    fontWeight: '600',
                    color: '#475569',
                    marginBottom: '0.75rem'
                  }
                }, `2. 출력할 주문 선택 (${selectedOrders.length}/${orders.length})`),
                React.createElement('div', {
                  style: {
                    display: 'flex',
                    gap: '1rem',
                    flexWrap: 'wrap'
                  }
                }, orders.map((order, index) =>
                  React.createElement('div', {
                    key: order.id,
                    style: {
                      display: 'flex',
                      alignItems: 'center',
                      gap: '0.5rem',
                      padding: '0.75rem',
                      background: selectedOrders.includes(index) ? '#dbeafe' : 'white',
                      border: `2px solid ${selectedOrders.includes(index) ? '#3b82f6' : '#e2e8f0'}`,
                      borderRadius: '8px',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    },
                    onClick: () => toggleOrderSelection(index)
                  },
                    React.createElement('input', {
                      type: 'checkbox',
                      checked: selectedOrders.includes(index),
                      onChange: () => {},
                      style: { cursor: 'pointer' }
                    }),
                    React.createElement('div', {
                      style: {
                        fontSize: '0.9rem',
                        fontWeight: '500',
                        color: '#1e293b'
                      }
                    }, `주문 ${index + 1}`),
                    React.createElement('div', {
                      style: {
                        fontSize: '0.8rem',
                        color: '#64748b'
                      }
                    }, `(${PRESETS[order.person]?.name || '미설정'})`)
                  )
                )),
                React.createElement('button', {
                  onClick: () => setSelectedOrders(orders.map((_, i) => i)),
                  style: {
                    marginTop: '0.5rem',
                    padding: '0.5rem 1rem',
                    background: '#f1f5f9',
                    border: '1px solid #cbd5e1',
                    borderRadius: '6px',
                    fontSize: '0.85rem',
                    cursor: 'pointer'
                  }
                }, '전체 선택')
              ),

              // 3. 데이터 편집 테이블
              selectedOrders.length > 0 && formTemplate && React.createElement('div', { 
                style: { 
                  marginBottom: '1.5rem',
                  marginTop: '1.5rem'
                } 
              },
                React.createElement('label', {
                  style: {
                    display: 'block',
                    fontSize: '0.95rem',
                    fontWeight: '600',
                    color: '#475569',
                    marginBottom: '0.75rem'
                  }
                }, '3. 데이터 편집'),
                React.createElement('div', {
                  style: {
                    overflowX: 'auto',
                    background: 'white',
                    border: '1px solid #e2e8f0',
                    borderRadius: '8px',
                    padding: '1rem'
                  }
                },
                  parseFormTemplate(formTemplate).map(field => {
                    const key = mapFieldToKey(field);
                    const isUnknown = key === field; // 매핑을 모르는 경우
                    
                    return React.createElement('div', {
                      key: field,
                      style: {
                        display: 'flex',
                        alignItems: 'center',
                        gap: '1rem',
                        marginBottom: '0.75rem',
                        paddingBottom: '0.75rem',
                        borderBottom: '1px solid #f1f5f9'
                      }
                    },
                      // 라벨명
                      React.createElement('div', {
                        style: {
                          minWidth: '120px',
                          display: 'flex',
                          flexDirection: 'column',
                          gap: '0.25rem'
                        }
                      },
                        React.createElement('div', {
                          style: {
                            fontWeight: '500',
                            fontSize: '0.9rem',
                            color: isUnknown ? '#ef4444' : '#475569'
                          }
                        }, field),
                        
                        // 알 수 없는 라벨일 경우 학습 옵션 표시
                        isUnknown && React.createElement('select', {
                          onChange: (e) => {
                            if (e.target.value) {
                              saveLearnedMapping(field, e.target.value);
                            }
                          },
                          style: {
                            fontSize: '0.75rem',
                            padding: '0.25rem',
                            border: '1px solid #fca5a5',
                            borderRadius: '4px',
                            background: '#fef2f2',
                            color: '#991b1b',
                            cursor: 'pointer'
                          }
                        },
                          React.createElement('option', { value: '' }, '항목 선택'),
                          React.createElement('option', { value: 'name' }, '이름'),
                          React.createElement('option', { value: 'receiver' }, '수취인'),
                          React.createElement('option', { value: 'orderNumber' }, '주문번호'),
                          React.createElement('option', { value: 'personId' }, '아이디'),
                          React.createElement('option', { value: 'phone' }, '전화번호'),
                          React.createElement('option', { value: 'phoneNoHyphen' }, '전화번호(하이픈없음)'),
                          React.createElement('option', { value: 'address' }, '주소'),
                          React.createElement('option', { value: 'price' }, '금액'),
                          React.createElement('option', { value: 'site' }, '사이트'),
                          React.createElement('option', { value: 'card' }, '카드'),
                          React.createElement('option', { value: 'bank' }, '은행'),
                          React.createElement('option', { value: 'accountWithHyphen' }, '계좌번호'),
                          React.createElement('option', { value: 'account' }, '계좌번호(하이픈없음)'),
                          React.createElement('option', { value: 'deliveryType' }, '배송'),
                          React.createElement('option', { value: 'reviewMethod' }, '리뷰'),
                          React.createElement('option', { value: 'reviewFee' }, '립비')
                        )
                      ),
                      
                      // 입력 칸들
                      React.createElement('div', {
                        style: {
                          display: 'flex',
                          gap: '0.5rem',
                          flex: 1,
                          flexWrap: 'wrap'
                        }
                      }, selectedOrders.map(orderIndex => {
                        // 아이디 필드는 드롭다운으로
                        if (key === 'personId') {
                          const selectedSite = editableData[orderIndex]?.site || '';
                          const currentSiteIds = SITE_IDS[selectedSite] || IDS || ['직접입력'];
                          
                          return React.createElement('select', {
                            key: orderIndex,
                            value: editableData[orderIndex]?.[key] || '',
                            onChange: (e) => updateEditableData(orderIndex, key, e.target.value),
                            style: {
                              flex: '1 1 200px',
                              padding: '0.5rem',
                              border: '1px solid #cbd5e1',
                              borderRadius: '6px',
                              fontSize: '0.85rem',
                              cursor: 'pointer'
                            }
                          },
                            currentSiteIds.map(id => 
                              React.createElement('option', { key: id, value: id }, id)
                            )
                          );
                        }
                        
                        // 나머지 필드는 텍스트 입력
                        return React.createElement('input', {
                          key: orderIndex,
                          type: 'text',
                          value: editableData[orderIndex]?.[key] || '',
                          onChange: (e) => updateEditableData(orderIndex, key, e.target.value),
                          placeholder: `주문${orderIndex + 1}`,
                          style: {
                            flex: '1 1 200px',
                            padding: '0.5rem',
                            border: '1px solid #cbd5e1',
                            borderRadius: '6px',
                            fontSize: '0.85rem'
                          }
                        });
                      }))
                    );
                  })
                )
              ),

              // 4. 복사 버튼
              React.createElement('div', {
                style: {
                  display: 'flex',
                  justifyContent: 'center',
                  gap: '0.75rem',
                  flexWrap: 'wrap'
                }
              },
                React.createElement('button', {
                  onClick: copyOutputToClipboard,
                  style: {
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    color: 'white',
                    border: 'none',
                    padding: '1rem 2rem',
                    borderRadius: '8px',
                    fontSize: '1rem',
                    fontWeight: '600',
                    cursor: 'pointer',
                    boxShadow: '0 4px 12px rgba(102, 126, 234, 0.4)'
                  }
                }, '📋 복사하기'),
                React.createElement('button', {
                  onClick: sendToExtension,
                  style: {
                    background: 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)',
                    color: 'white',
                    border: 'none',
                    padding: '1rem 2rem',
                    borderRadius: '8px',
                    fontSize: '1rem',
                    fontWeight: '600',
                    cursor: 'pointer',
                    boxShadow: '0 4px 12px rgba(245, 158, 11, 0.4)'
                  }
                }, '🔌 익스텐션으로 전송')
              )
            ),

            // 저장 / 초기화 버튼
            React.createElement('div', {
              style: {
                marginBottom: '1.5rem'
              }
            },
              React.createElement('h2', {
                style: {
                  fontSize: '1.3rem',
                  fontWeight: '600',
                  marginBottom: '1rem',
                  color: '#2d3748'
                }
              }, '💾 데이터 관리'),
              
              React.createElement('div', {
                style: {
                  display: 'flex',
                  gap: '1rem',
                  justifyContent: 'center'
                }
              },
                React.createElement('button', {
                  onClick: saveToGoogleSheets,
                  style: {
                    background: '#10b981',
                    color: 'white',
                    border: 'none',
                    padding: '1rem 2rem',
                    borderRadius: '8px',
                    fontSize: '1rem',
                    fontWeight: '600',
                    cursor: 'pointer',
                    boxShadow: '0 4px 12px rgba(16, 185, 129, 0.4)'
                  }
                }, '💾 구글시트 저장'),

                React.createElement('button', {
                  onClick: resetAllOrders,
                  style: {
                    background: '#ef4444',
                    color: 'white',
                    border: 'none',
                    padding: '1rem 2rem',
                    borderRadius: '8px',
                    fontSize: '1rem',
                    fontWeight: '600',
                    cursor: 'pointer',
                    boxShadow: '0 4px 12px rgba(239, 68, 68, 0.4)'
                  }
                }, '🗑️ 전체 초기화')
              )
            )
          )
        )
      );
    };

    ReactDOM.render(
      React.createElement(OrderManager),
      document.getElementById('root')
    );
  </script>
</body>
</html>
